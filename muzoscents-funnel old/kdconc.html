<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kevs Digital bOS | Mobile Marketplace & AI Concierge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0B1120; font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        .typing-indicator span {
            width: 8px; height: 8px; background: #94A3B8; border-radius: 50%;
            display: inline-block; animation: typing 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .product-card { transition: transform 0.2s ease, box-shadow 0.2s; touch-action: manipulation; }
        .product-card:active { transform: scale(0.98); }
        .cart-sidebar { transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); will-change: transform; }
        .debug-panel {
            background: #0F172A;
            border-top: 1px solid #1E293B;
            font-family: monospace;
            font-size: 10px;
            max-height: 140px;
            overflow-y: auto;
            transition: all 0.2s;
        }
        .debug-panel.hidden-debug { display: none; }
        .nav-stack-item, .mobile-nav-item {
            transition: all 0.2s;
            border-radius: 1rem;
            touch-action: manipulation;
        }
        .nav-stack-item.active, .mobile-nav-item.active {
            background: #1E3A8A;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .mobile-nav-item.active i, .mobile-nav-item.active span {
            color: white;
        }
        #chat-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        /* mobile optimizations: bottom nav hidden on chat + 2col grid */
        @media (max-width: 768px) {
            .desktop-sidebar { display: none; }
            .mobile-bottom-nav { display: flex; }
            .product-grid-mobile {
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 0.75rem;
            }
            .product-card-mobile-optimized {
                padding: 0.75rem;
            }
        }
        @media (min-width: 769px) {
            .mobile-bottom-nav { display: none; }
            .desktop-sidebar { display: flex; }
            .mobile-logout-btn { display: none !important; }
        }
        /* ensure no horizontal overflow */
        .overflow-fix {
            overflow-x: hidden;
        }
        /* smoother chat scroll */
        .chat-messages-scroll {
            scroll-behavior: smooth;
        }
        button, .cursor-pointer {
            cursor: pointer;
            touch-action: manipulation;
        }
        input, textarea {
            font-size: 16px; /* prevents zoom on iOS focus */
        }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-fix">

<div class="flex flex-col h-screen overflow-hidden">
    <div class="flex flex-1 overflow-hidden">
        <!-- DESKTOP LEFT SIDEBAR (hidden on mobile) -->
        <aside class="desktop-sidebar w-72 bg-slate-900/80 border-r border-slate-800 flex-shrink-0 flex flex-col p-5 backdrop-blur-sm">
            <div class="mb-8 pl-2">
                <h2 class="text-2xl font-extrabold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Kevs bOS</h2>
                <p class="text-xs text-slate-500 mt-1">omnichannel engine</p>
            </div>
            <nav class="flex-1 space-y-2">
                <div data-tab="shop" class="nav-stack-item flex items-center gap-4 px-4 py-3 cursor-pointer text-slate-300 hover:bg-slate-800/70 transition">
                    <i class="fa-solid fa-store text-xl w-6"></i><span class="font-medium">Marketplace</span>
                </div>
                <div data-tab="chat" class="nav-stack-item flex items-center gap-4 px-4 py-3 cursor-pointer text-slate-300 hover:bg-slate-800/70 transition">
                    <i class="fa-regular fa-comment-dots text-xl w-6"></i><span class="font-medium">Concierge AI</span>
                </div>
                <div data-tab="tickets" class="nav-stack-item flex items-center gap-4 px-4 py-3 cursor-pointer text-slate-300 hover:bg-slate-800/70 transition">
                    <i class="fa-regular fa-ticket-alt text-xl w-6"></i><span class="font-medium">Support Tickets</span>
                </div>
                <div data-tab="track" class="nav-stack-item flex items-center gap-4 px-4 py-3 cursor-pointer text-slate-300 hover:bg-slate-800/70 transition">
                    <i class="fa-solid fa-truck-fast text-xl w-6"></i><span class="font-medium">Track Order</span>
                </div>
            </nav>
            <div class="pt-6 border-t border-slate-800 mt-4">
                <div class="flex items-center justify-between">
                    <div class="text-xs"><span id="user-badge-side" class="bg-slate-800 px-2 py-1 rounded-full inline-flex items-center gap-1"><i class="fa-regular fa-user"></i> Guest</span></div>
                    <button id="logout-btn-side" class="bg-red-600/70 hover:bg-red-700 text-xs px-3 py-1.5 rounded-lg transition"><i class="fa-solid fa-right-from-bracket"></i> Exit</button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-950/30">
            <!-- top header with cart & mobile logout + debug -->
            <div class="flex justify-between items-center p-4 border-b border-slate-800 bg-slate-900/40 sticky top-0 z-10">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-cart-shopping text-blue-400 text-xl md:hidden"></i>
                    <h3 class="text-lg font-semibold md:hidden">Kevs bOS</h3>
                </div>
                <div class="flex items-center gap-3">
                    <span id="user-badge-mobile" class="text-xs bg-slate-800 px-2 py-1 rounded-full md:hidden">Guest</span>
                    <button id="mobile-logout-btn" class="bg-red-600/80 hover:bg-red-700 p-2 rounded-full text-xs transition md:hidden" title="Logout">
                        <i class="fa-solid fa-right-from-bracket text-sm"></i>
                    </button>
                    <button id="toggle-debug-btn" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-full text-xs transition" title="Toggle Debug Panel">
                        <i class="fa-solid fa-bug"></i>
                    </button>
                    <button id="cart-icon-main" class="relative bg-slate-800 hover:bg-slate-700 transition p-2 rounded-full">
                        <i class="fa-solid fa-bag-shopping text-lg"></i>
                        <span id="cart-count-global" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-md">0</span>
                    </button>
                </div>
            </div>

            <!-- Dynamic panel (scrollable) -->
            <div id="dynamic-panel" class="flex-1 overflow-y-auto p-4 md:p-6 scroll-smooth"></div>

            <!-- Chat input bar (only visible when chat active) -->
            <div id="chat-input-bar" class="hidden p-3 bg-slate-900/90 border-t border-slate-800 backdrop-blur-sm sticky bottom-0 z-20">
                <div class="flex gap-2 items-center max-w-3xl mx-auto">
                    <input id="chat-message-input" type="text" placeholder="Ask about products, orders, or support..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    <button id="chat-send-btn" class="bg-blue-600 hover:bg-blue-700 rounded-xl w-10 h-10 flex items-center justify-center transition"><i class="fa-regular fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- MOBILE BOTTOM NAVIGATION (visible only on mobile, hidden when chat tab active) -->
    <div id="mobile-bottom-nav" class="mobile-bottom-nav fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 flex justify-around p-2 z-30">
        <div data-tab="shop" class="mobile-nav-item flex flex-col items-center py-1 px-3 rounded-xl transition text-slate-400"><i class="fa-solid fa-store text-xl"></i><span class="text-[10px] mt-0.5">Market</span></div>
        <div data-tab="chat" class="mobile-nav-item flex flex-col items-center py-1 px-3 rounded-xl transition text-slate-400"><i class="fa-regular fa-comment-dots text-xl"></i><span class="text-[10px] mt-0.5">Concierge</span></div>
        <div data-tab="tickets" class="mobile-nav-item flex flex-col items-center py-1 px-3 rounded-xl transition text-slate-400"><i class="fa-regular fa-ticket-alt text-xl"></i><span class="text-[10px] mt-0.5">Tickets</span></div>
        <div data-tab="track" class="mobile-nav-item flex flex-col items-center py-1 px-3 rounded-xl transition text-slate-400"><i class="fa-solid fa-truck-fast text-xl"></i><span class="text-[10px] mt-0.5">Track</span></div>
    </div>

    <!-- CART SIDEBAR (right drawer) -->
    <div id="cart-drawer" class="cart-sidebar fixed top-0 right-0 w-full sm:w-96 h-full bg-slate-900 border-l border-slate-700 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/95">
            <h3 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-basket-shopping text-blue-400"></i> Your Cart</h3>
            <button id="close-drawer" class="text-slate-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="cart-items-panel" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-4 border-t border-slate-800 bg-slate-900/90">
            <div class="flex justify-between font-bold text-lg mb-4"><span>Total</span><span id="cart-grand-total" class="text-blue-300">₦0</span></div>
            <button id="cart-checkout-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 py-2.5 rounded-xl font-semibold transition shadow-lg">💳 Proceed to Checkout</button>
            <p class="text-[10px] text-slate-500 text-center mt-2">Point of Sale / Cash</p>
        </div>
    </div>

    <!-- DEBUG PANEL (toggleable) -->
    <div id="debug-panel" class="debug-panel text-slate-400 text-[11px] px-4 py-2 border-t border-slate-800/80">
        <div class="flex items-center gap-2 font-mono"><i class="fa-regular fa-terminal text-blue-400 text-xs"></i> <span class="font-semibold">DEBUG LOGS</span></div>
        <div id="logs-content" class="break-words font-mono leading-relaxed max-h-[100px] overflow-y-auto">⚡ System ready. Kevs bOS online.</div>
    </div>

    <!-- LOGIN / REGISTER MODAL (enhanced) -->
    <div id="authModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-2xl w-full max-w-md text-slate-200">
            <div class="flex justify-between items-center mb-4"><h3 id="modalTitle" class="text-xl font-bold">Sign In</h3><button id="closeModalBtn" class="text-2xl">&times;</button></div>
            <div class="space-y-3">
                <input id="authEmail" type="email" placeholder="Email address" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-sm">
                <input id="authPassword" type="password" placeholder="Password" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-sm">
                <div id="regExtraFields" class="hidden space-y-3 border-t border-slate-700/50 pt-3">
                    <input id="inviteCode" placeholder="Invite code (optional)" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm">
                    <div class="text-xs text-center text-slate-500">— OR create new org —</div>
                    <input id="orgName" placeholder="Organization name *" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm">
                    <div class="grid grid-cols-2 gap-2"><input id="orgLocation" placeholder="City, Country *" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm"><input id="orgNiche" placeholder="Industry *" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm"></div>
                    <input id="budget" type="number" placeholder="Budget (₦)" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm">
                    <div class="grid grid-cols-2 gap-2"><input id="firstName" placeholder="First name *" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm"><input id="lastName" placeholder="Last name *" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm"></div>
                    <input id="phoneNumber" placeholder="Phone number *" class="bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm">
                </div>
                <button id="authSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 font-semibold py-2.5 rounded-lg transition">Sign In</button>
                <button id="demoBtn" class="w-full bg-emerald-600/80 hover:bg-emerald-700 py-2.5 rounded-lg text-sm flex items-center justify-center gap-2"><i class="fa-solid fa-flask"></i> Demo Access</button>
                <div class="text-center"><button id="toggleAuthMode" class="text-xs text-blue-400 hover:underline">Don't have an account? Register business</button></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- API & GLOBALS ----------
    const API_BASE = "https://kevsono-kevs-digital-bos.hf.space";
    let token = localStorage.getItem('access_token');
    let userProfile = null;
    let currentTab = 'shop';
    let isRegisterMode = false;
    let typingIndicator = null;
    let sessionId = localStorage.getItem('pf_session') || ('web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 10));
    localStorage.setItem('pf_session', sessionId);
    let cart = [];
    
    // Debug
    let debugVisible = true;
    function log(msg) {
        const logsDiv = document.getElementById('logs-content');
        if (logsDiv) {
            logsDiv.innerHTML += `<br>⏺ [${new Date().toLocaleTimeString()}] ${msg}`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        console.log(msg);
    }
    function toggleDebugPanel() {
        const panel = document.getElementById('debug-panel');
        if (panel) {
            debugVisible = !debugVisible;
            if (debugVisible) panel.classList.remove('hidden-debug');
            else panel.classList.add('hidden-debug');
            localStorage.setItem('debug_visible', debugVisible);
        }
    }
    
    // API helpers with refresh
    async function refreshToken() {
        const refresh = localStorage.getItem('refresh_token');
        if (!refresh) return false;
        try {
            const res = await fetch(`${API_BASE}/auth/refresh`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ refresh_token: refresh }) });
            if (res.ok) { const { access_token, refresh_token } = await res.json(); localStorage.setItem('access_token', access_token); localStorage.setItem('refresh_token', refresh_token); token = access_token; return true; }
        } catch(e) { log("refresh failed"); }
        return false;
    }
    async function apiCall(endpoint, options = {}, retry = true) {
        if (!options.headers) options.headers = {};
        options.headers['Content-Type'] = 'application/json';
        if (token) options.headers['Authorization'] = `Bearer ${token}`;
        let res = await fetch(`${API_BASE}${endpoint}`, options);
        if (res.status === 401 && retry) { if (await refreshToken()) return apiCall(endpoint, options, false); showLoginModal(); throw new Error('Session expired'); }
        if (!res.ok) { const err = await res.json().catch(()=>({detail:'API error'})); throw new Error(err.detail || 'Request failed'); }
        return res.json();
    }
    
    // Cart functions
    function saveCart() { localStorage.setItem('kevs_cart', JSON.stringify(cart)); updateCartUI(); }
    function loadCart() { const saved = localStorage.getItem('kevs_cart'); cart = saved ? JSON.parse(saved) : []; updateCartUI(); }
    function updateCartUI() {
        const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
        document.getElementById('cart-grand-total').innerText = `₦${total.toLocaleString()}`;
        const count = cart.reduce((s,i) => s + i.quantity, 0);
        document.getElementById('cart-count-global').innerText = count;
        const container = document.getElementById('cart-items-panel');
        if (!container) return;
        if (cart.length === 0) { container.innerHTML = '<div class="text-center text-slate-500 py-8"><i class="fa-regular fa-basket-shopping text-3xl mb-2 opacity-40"></i><p>Cart empty</p></div>'; return; }
        container.innerHTML = cart.map((item, idx) => `
            <div class="flex justify-between items-center bg-slate-800/60 p-3 rounded-xl border border-slate-700">
                <div><span class="font-medium">${escapeHtml(item.name)}</span> <span class="text-xs text-slate-400">x${item.quantity}</span></div>
                <div class="font-mono text-blue-300">₦${(item.price * item.quantity).toLocaleString()}</div>
                <button onclick="removeCartItem(${idx})" class="text-red-400 hover:text-red-300"><i class="fa-regular fa-trash-can"></i></button>
            </div>
        `).join('');
    }
    window.removeCartItem = (idx) => { cart.splice(idx,1); saveCart(); if(currentTab === 'shop') renderShop(); };
    function addToCart(product) {
        let existing = cart.find(i => i.id === product.id);
        if(existing) existing.quantity++;
        else cart.push({ id: product.id, name: product.name, price: product.price, quantity: 1 });
        saveCart();
        showToast(`${product.name} added to cart`, 'success');
    }
    async function checkoutCart() {
        if (!cart.length) { showToast("Cart is empty", 'error'); return; }
        if (!token) { showLoginModal(); showToast("Please login first", 'error'); return; }
        const items = cart.map(i => ({ inventory_id: i.id, quantity: i.quantity }));
        try {
            const result = await apiCall('/pos/terminal/checkout', 'POST', { body: JSON.stringify({ items, payment_method: 'cash', customer_name: userProfile?.first_name || null }) });
            showToast(`✅ Checkout success! Receipt: ${result.receipt_number || 'OK'}`, 'success');
            cart = []; saveCart(); if(currentTab === 'shop') renderShop();
            document.getElementById('cart-drawer').classList.add('translate-x-full');
        } catch(err) { showToast(`Checkout error: ${err.message}`, 'error'); log(err); }
    }
    
    // SHOP with 2x2 grid on mobile, delegated add-to-cart
    async function renderShop() {
        const panel = document.getElementById('dynamic-panel');
        panel.innerHTML = `<div class="flex justify-center py-20"><i class="fa-solid fa-spinner fa-pulse text-3xl text-blue-400"></i><span class="ml-3">loading premium inventory...</span></div>`;
        try {
            const items = await apiCall('/inventory/public-list');
            if (!items || items.length === 0) { panel.innerHTML = '<div class="text-center py-16 text-slate-400 bg-slate-800/40 rounded-2xl">✨ No products available. Check back later.</div>'; return; }
            panel.innerHTML = `
                <div class="mb-4"><h2 class="text-2xl font-bold flex items-center gap-2"><i class="fa-solid fa-tag text-blue-400"></i> Digital Marketplace</h2><p class="text-sm text-slate-400">AI-powered inventory · 2‑column mobile grid</p></div>
                <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-5" id="products-grid">
                    ${items.map(p => `
                        <div class="product-card bg-slate-800/70 border border-slate-700 rounded-2xl p-3 md:p-4 backdrop-blur-sm flex flex-col" data-pid="${p.id}" data-pname="${escapeHtml(p.description)}" data-price="${p.price_naira}">
                            <div class="h-20 md:h-28 bg-gradient-to-br from-slate-700 to-slate-800 rounded-xl flex items-center justify-center mb-2"><i class="fa-solid fa-cube text-3xl md:text-4xl text-slate-500"></i></div>
                            <h3 class="font-semibold text-sm md:text-base truncate">${escapeHtml(p.description)}</h3>
                            <div class="flex justify-between items-center mt-2 flex-wrap gap-1">
                                <span class="text-blue-400 font-bold text-base md:text-xl">₦${p.price_naira.toLocaleString()}</span>
                                <span class="text-[10px] px-2 py-0.5 rounded-full ${p.current_qty > 5 ? 'bg-emerald-500/20 text-emerald-300' : p.current_qty > 0 ? 'bg-amber-500/20 text-amber-300' : 'bg-red-500/20 text-red-300'}">
                                    ${p.current_qty} left
                                </span>
                            </div>
                            <button class="add-to-cart-btn mt-3 w-full bg-blue-600 hover:bg-blue-500 transition py-2 rounded-xl text-xs md:text-sm font-medium flex items-center justify-center gap-2"><i class="fa-regular fa-cart-plus"></i> Add</button>
                        </div>
                    `).join('')}
                </div>
            `;
            // Attach delegated event for add to cart
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.removeEventListener('click', productClickHandler);
                btn.addEventListener('click', productClickHandler);
            });
        } catch(err) { panel.innerHTML = `<div class="bg-red-500/10 p-8 rounded-2xl text-center text-red-300">⚠️ Error loading shop: ${err.message}</div>`; log(err); }
    }
    function productClickHandler(e) {
        const card = e.currentTarget.closest('[data-pid]');
        if(card) {
            const id = parseInt(card.dataset.pid);
            const name = card.dataset.pname;
            const price = parseInt(card.dataset.price);
            addToCart({ id, name, price });
        }
    }
    
    // CHAT module with input focus fixed
    let chatContainer = null;
    function addChatMessage(sender, text) { if(!chatContainer) return; const div = document.createElement('div'); div.className = `p-3 rounded-xl max-w-[85%] text-sm shadow-md mb-2 ${sender === 'user' ? 'bg-blue-600 text-white ml-auto rounded-br-none' : 'bg-slate-800/90 text-slate-100 mr-auto rounded-bl-none border border-slate-700'}`; div.innerText = text; chatContainer.appendChild(div); chatContainer.parentElement?.scrollTo({ top: chatContainer.parentElement.scrollHeight, behavior: 'smooth' }); }
    function showTyping() { if(!chatContainer) return; if(typingIndicator) hideTyping(); typingIndicator = document.createElement('div'); typingIndicator.className = 'typing-indicator bg-slate-800/70 p-2 rounded-xl w-fit px-3 mb-2'; typingIndicator.innerHTML = '<span></span><span></span><span></span><span class="text-xs text-slate-400 ml-1"> Kevs AI typing...</span>'; chatContainer.appendChild(typingIndicator); chatContainer.parentElement?.scrollTo({ top: chatContainer.parentElement.scrollHeight }); }
    function hideTyping() { if(typingIndicator && typingIndicator.parentNode) typingIndicator.parentNode.removeChild(typingIndicator); typingIndicator = null; }
    async function sendChatMsg(message) { if(!message.trim()) return; addChatMessage('user', message); const inputField = document.getElementById('chat-message-input'); if(inputField) inputField.value = ''; showTyping(); try { const data = await apiCall('/support/chat-stream', { method:'POST', body: JSON.stringify({ session_id: sessionId, message }) }); hideTyping(); addChatMessage('assistant', data.response || "Response ready."); } catch(err) { hideTyping(); addChatMessage('assistant', `AI error: ${err.message}`); log(err); } }
    
    async function initChatUI() {
        const panel = document.getElementById('dynamic-panel');
        panel.innerHTML = '<div id="chat-messages-area" class="flex flex-col space-y-3 pb-4 max-h-[70vh] overflow-y-auto chat-messages-scroll"></div>';
        chatContainer = document.getElementById('chat-messages-area');
        const welcome = userProfile ? `Welcome back, ${userProfile.first_name}! I'm your AI concierge. Ask me about orders or inventory.` : "Hi! I'm Kevs AI. How can I assist your business today?";
        addChatMessage('assistant', welcome);
        const sendBtn = document.getElementById('chat-send-btn');
        const msgInput = document.getElementById('chat-message-input');
        if (!sendBtn || !msgInput) return;
        const freshSendBtn = sendBtn.cloneNode(true);
        sendBtn.parentNode.replaceChild(freshSendBtn, sendBtn);
        const sendHandler = () => { const text = msgInput.value.trim(); if (text) { msgInput.value = ''; sendChatMsg(text); } };
        freshSendBtn.onclick = sendHandler;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') { e.preventDefault(); sendHandler(); } };
        msgInput.disabled = false;
        setTimeout(() => msgInput.focus(), 100);
        log("Chat UI ready with focus");
    }
    
    // TICKETS & TRACK
    async function renderTickets() { const panel = document.getElementById('dynamic-panel'); panel.innerHTML = `<div class="text-center py-10"><i class="fa-solid fa-spinner fa-pulse"></i> Loading support requests...</div>`; try { const data = await apiCall('/support/tickets'); const tickets = data.tickets || []; if(tickets.length===0) { panel.innerHTML = '<div class="bg-slate-800/50 rounded-2xl p-10 text-center">🎫 No tickets yet. Start a chat to create one.</div>'; return; } panel.innerHTML = `<div class="space-y-3"><h3 class="text-xl font-bold mb-2">📬 Support Cases</h3>${tickets.map(t => `<div class="bg-slate-800 border border-slate-700 rounded-xl p-4"><div class="flex justify-between"><span class="text-xs font-mono text-blue-300">#${t.id.slice(0,8)}</span><span class="text-[10px] uppercase ${t.status==='open'?'bg-amber-500/20 text-amber-400':'bg-slate-700 text-slate-300'} px-2 py-0.5 rounded">${t.status}</span></div><p class="font-semibold mt-1">${escapeHtml(t.subject || 'General inquiry')}</p><p class="text-xs text-slate-400">Priority: ${t.priority}</p></div>`).join('')}</div>`; } catch(e) { panel.innerHTML = `<div class="text-red-400 p-5">Error: ${e.message}</div>`; log(e); } }
    async function renderTracking() { const panel = document.getElementById('dynamic-panel'); panel.innerHTML = `<div class="max-w-md mx-auto bg-slate-800/50 border border-slate-700 rounded-2xl p-6"><h3 class="text-xl font-bold flex gap-2"><i class="fa-solid fa-location-dot text-blue-400"></i> Track Shipment</h3><div class="mt-4 space-y-3"><input id="trackReceipt" placeholder="Receipt number" class="w-full bg-slate-950 border border-slate-700 p-3 rounded-xl"><input id="trackEmail" placeholder="Your email" class="w-full bg-slate-950 border border-slate-700 p-3 rounded-xl"><button id="trackAction" class="bg-blue-600 w-full py-2.5 rounded-xl font-medium">Track Now</button></div><div id="trackResult" class="mt-5 text-sm"></div></div>`; document.getElementById('trackAction')?.addEventListener('click', async () => { const receipt = document.getElementById('trackReceipt').value.trim(); const email = document.getElementById('trackEmail').value.trim(); if(!receipt || !email) { alert("Both fields required"); return; } const resDiv = document.getElementById('trackResult'); resDiv.innerHTML = '<div class="animate-pulse text-slate-400">🔍 Searching logistics...</div>'; try { const data = await apiCall(`/track-order?receipt_number=${receipt}&email=${email}`); const statusMap = { pending:"⏳ Pending", completed:"📦 Ready", shipped:"🚚 In transit", delivered:"✅ Delivered" }; resDiv.innerHTML = `<div class="bg-slate-900 p-4 rounded-xl space-y-1 text-xs"><div>Receipt: ${data.receipt_number}</div><div>Total: ₦${data.total_amount?.toLocaleString()}</div><div>Status: <span class="text-blue-300">${statusMap[data.shipping_status] || data.shipping_status}</span></div><div>Carrier: ${data.shipping_carrier || '—'}</div><div>Tracking: ${data.tracking_number || 'N/A'}</div></div>`; } catch(e) { resDiv.innerHTML = `<div class="text-red-400 p-3">${e.message}</div>`; log(e); } }); }
    
    // Tab switching + handle bottom navigation visibility on chat (mobile)
    async function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-stack-item, .mobile-nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll(`[data-tab="${tab}"]`).forEach(el => el.classList.add('active'));
        const chatBar = document.getElementById('chat-input-bar');
        const mobileBottomNav = document.getElementById('mobile-bottom-nav');
        const isMobile = window.innerWidth <= 768;
        if (tab === 'chat') {
            chatBar.classList.remove('hidden');
            if (isMobile && mobileBottomNav) mobileBottomNav.style.display = 'none';
            await initChatUI();
        } else {
            chatBar.classList.add('hidden');
            if (isMobile && mobileBottomNav) mobileBottomNav.style.display = 'flex';
            if(tab === 'shop') await renderShop();
            else if(tab === 'tickets') await renderTickets();
            else if(tab === 'track') await renderTracking();
        }
    }
    
    // AUTH & MODAL
    function showLoginModal() { document.getElementById('authModal').classList.remove('hidden'); }
    function hideLoginModal() { document.getElementById('authModal').classList.add('hidden'); }
    async function loadUserContext() { try { const me = await apiCall('/auth/me'); const ctx = await apiCall(`/support/customer-context?target_user_id=${me.user_id}`); userProfile = ctx.profile || { first_name: me.email?.split('@')[0] || 'User' }; let org = ''; try { const o = await apiCall('/auth/org'); org = o.org_name; } catch(e) {} const nameDisplay = `${userProfile.first_name}${org ? ` | ${org}` : ''}`; document.querySelectorAll('#user-badge-side, #user-badge-mobile').forEach(el => el.innerHTML = `<i class="fa-regular fa-user"></i> ${nameDisplay}`); } catch(e) { throw e; } }
    async function logout() { try { await apiCall('/auth/logout', 'POST'); } catch(e) {} localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token'); token = null; userProfile = null; cart = []; saveCart(); showLoginModal(); if(currentTab === 'shop') renderShop(); const mobileNav = document.getElementById('mobile-bottom-nav'); if(mobileNav) mobileNav.style.display = 'flex'; document.getElementById('chat-input-bar')?.classList.add('hidden'); }
    async function demoLogin() { try { const res = await fetch(`${API_BASE}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email:'demo@kevsdigital.com', password:'KevsDemo2026!' }) }); const data = await res.json(); if(!res.ok) throw new Error(data.detail); token = data.access_token; localStorage.setItem('access_token', token); localStorage.setItem('refresh_token', data.refresh_token); await loadUserContext(); hideLoginModal(); switchTab('shop'); log("Demo login success"); } catch(e) { alert("Demo failed: "+e.message); } }
    
    // Event binding
    document.getElementById('toggleAuthMode')?.addEventListener('click', () => { isRegisterMode = !isRegisterMode; document.getElementById('modalTitle').innerText = isRegisterMode ? "Register Organization" : "Sign In"; document.getElementById('authSubmitBtn').innerText = isRegisterMode ? "Create Profile" : "Sign In"; document.getElementById('regExtraFields').classList.toggle('hidden', !isRegisterMode); });
    document.getElementById('authSubmitBtn')?.addEventListener('click', async () => { const email = document.getElementById('authEmail').value.trim(); const pwd = document.getElementById('authPassword').value.trim(); if(!email || !pwd) return alert("Email & password required"); if(isRegisterMode) { const fname = document.getElementById('firstName').value.trim(), lname = document.getElementById('lastName').value.trim(), phone = document.getElementById('phoneNumber').value.trim(); if(!fname || !lname || !phone) return alert("First name, last name, phone required"); const invite = document.getElementById('inviteCode').value.trim(); const orgName = document.getElementById('orgName').value.trim(); const loc = document.getElementById('orgLocation').value.trim(); const niche = document.getElementById('orgNiche').value.trim(); if(!invite && (!orgName || !loc || !niche)) return alert("Provide invite code or org details"); const payload = { email, password:pwd, first_name:fname, last_name:lname, phone }; if(invite) payload.invite_code = invite; else { payload.org_name = orgName; payload.location = loc; payload.niche = niche; payload.budget = parseInt(document.getElementById('budget').value)||0; } try { await apiCall('/auth/register', 'POST', { body: JSON.stringify(payload) }); alert("Registration success! Please sign in."); isRegisterMode=false; document.getElementById('regExtraFields').classList.add('hidden'); } catch(e) { alert(e.message); } return; } try { const loginRes = await fetch(`${API_BASE}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password:pwd }) }); const data = await loginRes.json(); if(!loginRes.ok) throw new Error(data.detail); token = data.access_token; localStorage.setItem('access_token', token); localStorage.setItem('refresh_token', data.refresh_token); await loadUserContext(); hideLoginModal(); switchTab('shop'); } catch(e) { alert(e.message); } });
    document.getElementById('demoBtn')?.addEventListener('click', demoLogin); document.getElementById('closeModalBtn')?.addEventListener('click', hideLoginModal);
    document.getElementById('logout-btn-side')?.addEventListener('click', logout);
    document.getElementById('mobile-logout-btn')?.addEventListener('click', logout);
    document.getElementById('cart-icon-main')?.addEventListener('click', () => document.getElementById('cart-drawer').classList.remove('translate-x-full'));
    document.getElementById('close-drawer')?.addEventListener('click', () => document.getElementById('cart-drawer').classList.add('translate-x-full'));
    document.getElementById('cart-checkout-btn')?.addEventListener('click', checkoutCart);
    document.getElementById('toggle-debug-btn')?.addEventListener('click', toggleDebugPanel);
    document.querySelectorAll('.nav-stack-item, .mobile-nav-item').forEach(el => el.addEventListener('click', () => switchTab(el.getAttribute('data-tab'))));
    function showToast(msg, type) { const t = document.createElement('div'); t.className = `fixed bottom-24 left-4 right-4 md:left-auto md:right-6 z-50 bg-${type==='success'?'green-600':'red-600'} text-white px-4 py-2 rounded-xl shadow-lg text-sm animate-pulse`; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2800); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    // Init
    (async () => {
        const savedDebug = localStorage.getItem('debug_visible');
        if (savedDebug === 'false') { debugVisible = false; document.getElementById('debug-panel')?.classList.add('hidden-debug'); }
        loadCart();
        if(token) { try { await loadUserContext(); switchTab('shop'); } catch(e) { token=null; showLoginModal(); } } 
        else { showLoginModal(); }
        window.addToCart = addToCart;
        log("✅ Mobile optimized: 2x2 grid, bottom-nav hides on chat, logout on header");
    })();
</script>
</body>
