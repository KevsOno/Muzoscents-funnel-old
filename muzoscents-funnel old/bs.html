<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevs BI – Support Desk (Debug)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --kevs-blue: #1E3A5F; --kevs-cream: #F8FAFC; }
        body { background-color: #F1F5F9; font-family: system-ui, sans-serif; }
        .debug-panel {
            background: #1e1e2f;
            color: #00ffcc;
            font-family: monospace;
            font-size: 10px;
            height: 120px;
            overflow-y: auto;
            padding: 6px;
            border-top: 2px solid #ff6600;
        }
        .debug-log { border-bottom: 1px solid #333; margin-bottom: 3px; }
        .ticket-active { background-color: #F1F5F9; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="font-sans antialiased h-screen flex flex-col overflow-hidden">

<div id="toast-container" class="fixed top-6 right-4 z-50 space-y-2 w-80"></div>

<header class="bg-[#1E3A5F] text-white px-6 py-4 flex items-center justify-between shrink-0 shadow-md">
    <div class="flex items-center gap-3">
        <div class="font-bold text-xl tracking-tight"><span class="text-orange-500">Kevs</span>BI</div>
        <div class="text-xs bg-white/10 px-2.5 py-1 rounded-full">Support Desk (Debug)</div>
    </div>
    <div class="flex items-center gap-4">
        <div class="text-right text-xs">Agent Panel</div>
        <button onclick="window.location.href='/bizintel'" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg transition">Marketing Dashboard</button>
    </div>
</header>

<main class="flex-1 flex overflow-hidden">
    <!-- Left sidebar (ticket list) -->
    <section class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 overflow-hidden">
        <div class="p-4 border-b bg-slate-50">
            <select id="queue-status-filter" class="w-full border rounded-lg p-1.5 text-xs">
                <option value="open">🟢 Open Tickets</option>
                <option value="pending">🟡 Escalated</option>
                <option value="resolved">⚫ Resolved</option>
            </select>
        </div>
        <div id="ticket-feed" class="flex-1 overflow-y-auto divide-y divide-slate-100">
            <div class="p-8 text-center text-xs">Loading tickets...</div>
        </div>
    </section>

    <!-- Center: ticket detail & messages -->
    <section class="flex-1 bg-slate-50 flex flex-col overflow-hidden relative">
        <div id="no-ticket-selected" class="absolute inset-0 bg-slate-50 z-10 flex items-center justify-center p-6 text-center">
            <div><i class="fa-solid fa-inbox text-3xl text-slate-300 mb-2"></i><p class="text-sm">Select a ticket</p></div>
        </div>
        <div class="bg-white border-b px-6 py-3 shrink-0">
            <h2 id="active-ticket-subject" class="font-semibold">-</h2>
            <p id="active-ticket-meta" class="text-xs text-slate-400">-</p>
        </div>
        <div id="message-flow-area" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
        <div class="bg-white border-t p-4 shrink-0">
            <form id="agent-reply-form" class="flex gap-2">
                <input id="agent-response-input" placeholder="Type reply..." class="flex-1 border rounded-xl px-4 py-2 text-sm" required>
                <button type="submit" class="bg-[#1E3A5F] text-white px-4 py-2 rounded-xl">Send</button>
            </form>
        </div>
    </section>

    <!-- Right panel: customer context -->
    <section class="w-80 bg-white border-l border-slate-200 flex flex-col shrink-0 overflow-y-auto p-5 space-y-6">
        <div><h3 class="text-xs font-bold uppercase">Customer Profile</h3><div id="profile-display" class="text-xs mt-2">-</div></div>
        <div><h3 class="text-xs font-bold uppercase">Loyalty</h3><div id="loyalty-display" class="text-xs mt-2">-</div></div>
        <textarea id="ticket-resolution-notes" rows="3" placeholder="Resolution notes" class="border rounded-lg p-2 text-xs"></textarea>
        <button id="resolve-ticket-btn" class="bg-emerald-600 text-white py-2 rounded-lg text-xs">Resolve Ticket</button>
    </section>
</main>

<!-- Debug panel -->
<div class="debug-panel" id="debug-panel">
    <div class="text-white text-xs mb-1">🔍 API DEBUG LOGS</div>
    <div id="debug-logs"></div>
</div>

<script>
    const BACKEND_URL = 'https://kevsono-penafort-concierge.hf.space';
    let token = localStorage.getItem('access_token');
    let activeTicketId = null;

    function addDebugLog(endpoint, method, status, responseText, error=null) {
        const logsDiv = document.getElementById('debug-logs');
        const entry = document.createElement('div');
        entry.className = 'debug-log text-xs';
        const timestamp = new Date().toLocaleTimeString();
        let color = status >= 200 && status < 300 ? '#00cc88' : (status ? '#ff8888' : '#ffaa44');
        let statusText = status ? status : 'NETWORK ERROR';
        entry.innerHTML = `<span style="color:#aaa">[${timestamp}]</span> <span style="color:${color}">${method} ${endpoint}</span> → ${statusText}<br>${error ? `❌ ${error}` : `📦 ${responseText?.substring(0, 150) || ''}`}`;
        logsDiv.appendChild(entry);
        logsDiv.scrollTop = logsDiv.scrollHeight;
        console.log(`[DEBUG] ${method} ${endpoint}`, status, responseText, error);
    }

    async function req(endpoint, method='GET', body=null) {
        const url = `${BACKEND_URL}${endpoint}`;
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        try {
            const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
            let responseData;
            const contentType = res.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                responseData = await res.json();
            } else {
                responseData = { raw: await res.text() };
            }
            addDebugLog(endpoint, method, res.status, JSON.stringify(responseData).substring(0, 300));
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return responseData;
        } catch (err) {
            addDebugLog(endpoint, method, null, null, err.message);
            throw err;
        }
    }

    async function loadTickets() {
        const status = document.getElementById('queue-status-filter').value;
        try {
            const data = await req(`/support/tickets?status=${status}`);
            const feed = document.getElementById('ticket-feed');
            feed.innerHTML = '';
            if (!data.tickets || data.tickets.length === 0) {
                feed.innerHTML = '<div class="p-8 text-center text-xs">No tickets found</div>';
                return;
            }
            data.tickets.forEach(t => {
                const div = document.createElement('div');
                div.className = `p-4 cursor-pointer hover:bg-slate-50 ${activeTicketId === t.id ? 'ticket-active' : ''}`;
                div.onclick = () => selectTicket(t.id);
                div.innerHTML = `<div class="font-semibold text-sm">${t.subject}</div><div class="text-xs text-slate-500">${t.status} | ${new Date(t.created_at).toLocaleString()}</div>`;
                feed.appendChild(div);
            });
        } catch (err) {
            document.getElementById('ticket-feed').innerHTML = `<div class="p-8 text-center text-red-500">Error: ${err.message}</div>`;
        }
    }

    async function selectTicket(ticketId) {
        activeTicketId = ticketId;
        document.getElementById('no-ticket-selected').classList.add('hidden');
        try {
            const data = await req(`/support/tickets/${ticketId}`);
            document.getElementById('active-ticket-subject').innerText = data.ticket.subject;
            document.getElementById('active-ticket-meta').innerText = `ID: ${data.ticket.id}`;
            const container = document.getElementById('message-flow-area');
            container.innerHTML = '';
            (data.messages || []).forEach(m => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `p-2 rounded-lg ${m.sender_type === 'agent' ? 'bg-blue-100 text-right' : 'bg-gray-100'}`;
                msgDiv.innerText = `${m.sender_type}: ${m.message}`;
                container.appendChild(msgDiv);
            });
            await loadCustomerContext(data.ticket.user_id);
            loadTickets();
        } catch (err) {
            alert('Failed to load ticket: ' + err.message);
        }
    }

    async function loadCustomerContext(userId) {
        try {
            const data = await req(`/support/customer-context?user_id=${userId}`);
            document.getElementById('profile-display').innerHTML = data.profile ? `${data.profile.first_name} ${data.profile.last_name}<br>${data.profile.phone || '-'}` : 'No profile';
            document.getElementById('loyalty-display').innerHTML = data.loyalty ? `Points: ${data.loyalty.current_points}<br>Tier: ${data.loyalty.tier}` : 'No loyalty data';
        } catch (err) {
            document.getElementById('profile-display').innerHTML = `Error: ${err.message}`;
        }
    }

    document.getElementById('agent-reply-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!activeTicketId) return;
        const msg = document.getElementById('agent-response-input').value.trim();
        if (!msg) return;
        try {
            const data = await req(`/support/tickets/${activeTicketId}/message`, 'POST', { message: msg });
            selectTicket(activeTicketId);
            document.getElementById('agent-response-input').value = '';
        } catch (err) {
            alert('Failed to send: ' + err.message);
        }
    });

    document.getElementById('resolve-ticket-btn').addEventListener('click', async () => {
        if (!activeTicketId) return;
        const notes = document.getElementById('ticket-resolution-notes').value;
        try {
            await req(`/support/tickets/${activeTicketId}/resolve`, 'POST', { resolution_notes: notes });
            alert('Ticket resolved');
            activeTicketId = null;
            document.getElementById('no-ticket-selected').classList.remove('hidden');
            loadTickets();
        } catch (err) {
            alert('Resolve failed: ' + err.message);
        }
    });

    document.getElementById('queue-status-filter').addEventListener('change', loadTickets);

    if (!token) {
        window.location.href = '/bisignin';
    } else {
        loadTickets();
    }
</script>
</body>
</html>
