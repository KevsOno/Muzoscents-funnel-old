<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevs Digital Concierge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #0F172A; font-family: system-ui; }
        .debug-panel { background: #1e1e2f; color: #0fc; font-family: monospace; font-size: 10px; border-top: 2px solid #f60; max-height: 120px; overflow-y: auto; padding: 6px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-end p-6">
<div id="widget" class="w-full max-w-md bg-slate-50 h-[700px] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
    <div class="bg-[#1E3A5F] p-5 text-white shrink-0">
        <h3 class="font-bold">Kevs Digital Concierge</h3>
        <p id="auth-status" class="text-xs">Checking...</p>
        <div id="loyalty-banner" class="mt-3 hidden bg-white/10 rounded-xl p-2 flex justify-between">
            <span id="loyalty-name">-</span>
            <span id="loyalty-points">0 pts</span>
        </div>
    </div>

    <!-- Login area (shown if not authenticated) -->
    <div id="login-area" class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="bg-white p-6 rounded-2xl shadow w-full max-w-xs">
            <button id="demo-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-bold mb-3 flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> One-Click Demo
            </button>
            <div class="text-center text-xs text-gray-400 my-2">OR</div>
            <input id="login-email" type="email" placeholder="Email" class="w-full border p-2 rounded mb-2">
            <input id="login-password" type="password" placeholder="Password" class="w-full border p-2 rounded mb-3">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-2 rounded-lg">Login</button>
            <div id="login-error" class="text-red-500 text-xs mt-2 hidden"></div>
        </div>
    </div>

    <!-- Chat area (shown after login) -->
    <div id="chat-area" class="flex-1 flex flex-col hidden overflow-hidden">
        <div id="messages" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
        <div class="p-4 bg-white border-t">
            <form id="chat-form" class="flex gap-2">
                <input id="input" class="flex-1 border rounded-xl px-3 py-2 text-sm" placeholder="Ask or enter phone...">
                <button type="submit" class="bg-[#1E3A5F] text-white px-4 py-2 rounded-xl">Send</button>
            </form>
            <button id="reset" class="text-[10px] text-slate-400 mt-2 w-full">Reset Chat</button>
        </div>
    </div>

    <div class="debug-panel shrink-0">
        <div class="text-white text-xs mb-1">🔍 DEBUG</div>
        <div id="debug"></div>
    </div>
</div>

<script>
    const BACKEND = 'https://kevsono-penafort-concierge.hf.space';
    let sessionId = crypto.randomUUID();
    let authedPhone = null;

    function log(endpoint, method, status, data, err) {
        const div = document.getElementById('debug');
        const entry = document.createElement('div');
        entry.className = 'text-xs border-b border-gray-700 py-1';
        const ts = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="text-gray-400">[${ts}]</span> <span class="${status>=200 && status<300 ? 'text-green-400' : 'text-red-400'}">${method} ${endpoint}</span> → ${status || 'ERR'}<br>${err ? `❌ ${err}` : (data ? JSON.stringify(data).substring(0,150) : '')}`;
        div.appendChild(entry);
        div.scrollTop = div.scrollHeight;
    }

    async function call(endpoint, method='GET', body=null) {
        const token = localStorage.getItem('access_token');
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(`${BACKEND}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
        let data;
        try { data = await res.json(); } catch(e) { data = { raw: await res.text() }; }
        log(endpoint, method, res.status, data);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${JSON.stringify(data)}`);
        return data;
    }

    async function validateToken() {
        const token = localStorage.getItem('access_token');
        if (!token) return false;
        try {
            await call('/auth/me');
            return true;
        } catch (e) {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_id');
            return false;
        }
    }

    function addMessage(role, text) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `flex gap-2 ${role === 'user' ? 'justify-end' : ''}`;
        div.innerHTML = `
            ${role !== 'user' ? '<div class="w-8 h-8 bg-[#1E3A5F] rounded-full flex items-center justify-center text-white text-xs">AI</div>' : ''}
            <div class="max-w-[75%] bg-white p-3 rounded-2xl shadow-sm text-sm">${text}</div>
            ${role === 'user' ? '<div class="w-8 h-8 bg-emerald-600 rounded-full flex items-center justify-center text-white text-xs">Me</div>' : ''}
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function doLogin(email, password) {
        try {
            const data = await call('/auth/login', 'POST', { email, password });
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_id', data.user_id);
            return true;
        } catch (err) {
            document.getElementById('login-error').innerText = err.message;
            document.getElementById('login-error').classList.remove('hidden');
            return false;
        }
    }

    async function demoLogin() {
        const btn = document.getElementById('demo-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Logging...';
        btn.disabled = true;
        const ok = await doLogin('demo@kevsdigital.com', 'KevsDemo2026!');
        if (ok) {
            window.location.reload(); // refresh to show chat
        } else {
            btn.innerHTML = orig;
            btn.disabled = false;
        }
    }

    async function fetchLoyalty(phone) {
        try {
            const data = await call(`/loyalty/lookup?phone=${phone}`);
            authedPhone = phone;
            document.getElementById('loyalty-banner').classList.remove('hidden');
            document.getElementById('loyalty-name').innerHTML = `${data.first_name} | ${data.tier}`;
            document.getElementById('loyalty-points').innerHTML = `${Math.round(data.current_points)} pts`;
            addMessage('assistant', `Welcome ${data.first_name}! Points: ${data.current_points}, Tier: ${data.tier}`);
        } catch (err) {
            addMessage('assistant', `Loyalty error: ${err.message}`);
        }
    }

    async function sendMessage(msg) {
        addMessage('user', msg);
        if (/^\d{7,15}$/.test(msg)) {
            await fetchLoyalty(msg);
            return;
        }
        try {
            const data = await call('/support/chat-stream', 'POST', { session_id: sessionId, message: msg });
            addMessage('assistant', data.response || 'No response');
        } catch (err) {
            addMessage('assistant', `Error: ${err.message}`);
        }
    }

    async function init() {
        const valid = await validateToken();
        if (valid) {
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('chat-area').classList.remove('hidden');
            document.getElementById('auth-status').innerHTML = '✅ Authenticated';
            addMessage('assistant', 'You are logged in. Enter a phone number to check loyalty, or ask a question.');
        } else {
            document.getElementById('login-area').classList.remove('hidden');
            document.getElementById('chat-area').classList.add('hidden');
            document.getElementById('auth-status').innerHTML = '🔐 Not logged in';
        }
    }

    document.getElementById('demo-btn')?.addEventListener('click', demoLogin);
    document.getElementById('login-btn')?.addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const pwd = document.getElementById('login-password').value;
        if (!email || !pwd) {
            document.getElementById('login-error').innerText = 'Enter email and password';
            document.getElementById('login-error').classList.remove('hidden');
            return;
        }
        if (await doLogin(email, pwd)) window.location.reload();
    });
    document.getElementById('chat-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const inp = document.getElementById('input');
        const val = inp.value.trim();
        if (!val) return;
        inp.value = '';
        await sendMessage(val);
    });
    document.getElementById('reset')?.addEventListener('click', () => {
        document.getElementById('messages').innerHTML = '';
        sessionId = crypto.randomUUID();
        authedPhone = null;
        document.getElementById('loyalty-banner').classList.add('hidden');
        addMessage('assistant', 'Session reset. Start over.');
    });

    init();
</script>
</body>
</html>
