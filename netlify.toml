[build]
  command = "cd netlify/functions && npm install || echo 'No dependencies to install'"
  publish = "muzoscents-funnel-old"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
