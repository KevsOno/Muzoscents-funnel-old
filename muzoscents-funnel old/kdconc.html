<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevs Digital Concierge & Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #0F172A; font-family: system-ui, sans-serif; }
        .debug-panel { background: #1e1e2f; color: #0fc; font-family: monospace; font-size: 10px; max-height: 120px; overflow-y: auto; padding: 6px; }
        .nav-tab { cursor: pointer; padding: 8px 12px; border-radius: 20px; transition: 0.2s; color: #94A3B8; display: flex; align-items: center; gap: 6px; }
        .nav-tab.active { background: #1E3A8A; color: #FFFFFF; }
        #chat-input { background-color: #0f172a !important; color: white !important; }
        #chat-input:focus { outline: none; border-color: #3b82f6; }
        /* Typing indicator animation */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: #1e293b;
            border-radius: 16px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
</head>
<body class="text-slate-200">

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-900 shadow-2xl relative">
    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
        <div>
            <h1 class="font-bold text-lg text-white">Kevs Digital bOS</h1>
            <p class="text-xs text-slate-400">Omnichannel Customer Concierge</p>
        </div>
        <div class="flex gap-2 items-center">
            <span id="user-badge" class="text-xs bg-slate-700 px-2 py-1 rounded-full"></span>
            <button id="logout-btn" class="bg-red-600/80 hover:bg-red-700 text-xs text-white px-3 py-1.5 rounded-lg transition">
                <i class="fa-solid fa-sign-out-alt mr-1"></i> Logout
            </button>
        </div>
    </header>

    <nav class="flex justify-around bg-slate-800/50 p-2 border-b border-slate-700/50 text-sm font-medium">
        <div data-tab="chat" class="nav-tab active"><i class="fa-solid fa-comments"></i> Chat</div>
        <div data-tab="shop" class="nav-tab"><i class="fa-solid fa-store"></i> Shop</div>
        <div data-tab="tickets" class="nav-tab"><i class="fa-solid fa-ticket"></i> Tickets</div>
        <div data-tab="track" class="nav-tab"><i class="fa-solid fa-truck"></i> Track Order</div>
    </nav>

    <main id="dynamic-panel" class="flex-1 p-4 overflow-y-auto space-y-4 text-slate-800">
        <div id="chat-container" class="space-y-4"></div>
    </main>

    <div id="input-bar" class="p-3 bg-slate-800 border-t border-slate-700 flex gap-2 items-center">
        <input id="chat-input" type="text" placeholder="Type your message..." 
               autocomplete="off" spellcheck="false"
               class="flex-1 bg-slate-950 text-slate-100 placeholder-slate-500 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
        <button id="chat-send" class="bg-blue-600 hover:bg-blue-700 text-white w-9 h-9 rounded-lg flex items-center justify-center transition">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <div class="debug-panel">
        <div class="font-bold border-b border-slate-700 pb-0.5 mb-1 text-slate-400">DEBUG LOGS:</div>
        <div id="logs-content">System initialized... Ready.</div>
    </div>
</div>

<!-- Login Modal (unchanged) -->
<div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl w-full max-w-sm text-slate-200">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modal-title" class="text-lg font-bold text-white">Sign In to Workspace</h3>
            <button id="close-modal-btn" class="text-slate-400 hover:text-white text-lg"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="space-y-3">
            <div>
                <label class="text-xs text-slate-400 block mb-1">Invite/Org Code</label>
                <input id="auth-org" type="text" placeholder="e.g., KD001 (Leave blank if registering)" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-xs text-slate-400 block mb-1">Email Address</label>
                <input id="auth-email" type="email" placeholder="you@company.com" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-xs text-slate-400 block mb-1">Password</label>
                <input id="auth-password" type="password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div id="reg-fields" class="hidden space-y-3 pt-1 border-t border-slate-700/50 mt-2">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">First Name</label>
                        <input id="auth-fname" type="text" placeholder="John" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Last Name</label>
                        <input id="auth-lname" type="text" placeholder="Doe" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Phone Number</label>
                    <input id="auth-phone" type="text" placeholder="e.g., +234..." class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-500">
                </div>
            </div>
            <button id="modal-submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 font-medium text-white p-2.5 rounded-lg transition text-sm">Sign In</button>
            <button id="demo-login-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-2.5 rounded-lg text-sm mt-2">
                <i class="fa-solid fa-bolt mr-1"></i> Try Demo Account
            </button>
            <div class="text-center mt-2">
                <button id="toggle-auth-mode" class="text-xs text-blue-400 hover:underline">Don't have an account? Register business</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://kevsono-kevs-digital-bos.hf.space";
    let token = localStorage.getItem('access_token');
    let userProfile = null;
    let currentTab = 'chat';
    let isRegisterMode = false;
    let typingIndicatorDiv = null; // to store reference to typing indicator

    function log(msg) {
        const div = document.getElementById('logs-content');
        div.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
        div.scrollTop = div.scrollHeight;
    }

    async function refreshToken() {
        const refresh = localStorage.getItem('refresh_token');
        if (!refresh) return false;
        try {
            const res = await fetch(`${API_BASE}/auth/refresh`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: refresh })
            });
            if (res.ok) {
                const { access_token, refresh_token } = await res.json();
                localStorage.setItem('access_token', access_token);
                localStorage.setItem('refresh_token', refresh_token);
                token = access_token;
                return true;
            }
        } catch (e) {}
        return false;
    }

    async function apiCall(endpoint, options = {}, retry = true) {
        if (!options.headers) options.headers = {};
        options.headers['Content-Type'] = 'application/json';
        if (token) options.headers['Authorization'] = `Bearer ${token}`;
        let res = await fetch(`${API_BASE}${endpoint}`, options);
        if (res.status === 401 && retry) {
            const ok = await refreshToken();
            if (ok) return apiCall(endpoint, options, false);
            showLoginModal();
            throw new Error('Session expired');
        }
        if (!res.ok) {
            const err = await res.json().catch(()=>({detail:'Error'}));
            throw new Error(err.detail || 'API error');
        }
        return res.json();
    }

    function showLoginModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
    function hideLoginModal() { document.getElementById('auth-modal').classList.add('hidden'); }

    async function logout() {
        try { await apiCall('/auth/logout', 'POST'); } catch(e) {}
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        token = null;
        userProfile = null;
        document.getElementById('user-badge').innerText = '';
        showLoginModal();
        const chatContainer = document.getElementById('chat-container');
        if (chatContainer) chatContainer.innerHTML = '';
        addChatMessage('assistant', 'You have been logged out. Please sign in again.');
        log('Logged out');
    }

    async function demoLogin() {
        const btn = document.getElementById('demo-login-btn');
        btn.disabled = true;
        try {
            const data = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'demo@kevsdigital.com', password: 'KevsDemo2026!' })
            }).then(r => r.json());
            if (data.access_token) {
                token = data.access_token;
                localStorage.setItem('access_token', token);
                localStorage.setItem('refresh_token', data.refresh_token);
                await loadUserContext();
                hideLoginModal();
                switchTab(currentTab);
                log('Demo login successful');
            } else throw new Error('Login failed');
        } catch (err) {
            alert('Demo login failed: ' + err.message);
            log('Demo error: ' + err.message);
        } finally {
            btn.disabled = false;
        }
    }

    async function loadUserContext() {
        try {
            const me = await apiCall('/auth/me');
            const context = await apiCall(`/support/customer-context?target_user_id=${me.user_id}`);
            userProfile = context.profile || { first_name: 'Customer' };
            let orgName = '';
            try {
                const orgData = await apiCall('/auth/org');
                orgName = orgData.org_name;
            } catch (e) { orgName = 'Workspace'; }
            document.getElementById('user-badge').innerHTML = `<i class="fa-regular fa-user mr-1"></i> ${userProfile.first_name} | ${orgName}`;
            log(`Session active for ${userProfile.first_name} @ ${orgName}`);
        } catch (err) {
            log(`Profile error: ${err.message}`);
            userProfile = { first_name: 'Guest' };
            document.getElementById('user-badge').innerHTML = 'Guest';
        }
    }

    // Typing indicator functions
    function showTypingIndicator() {
        const container = document.getElementById('chat-container');
        if (!container) return;
        if (typingIndicatorDiv) hideTypingIndicator();
        typingIndicatorDiv = document.createElement('div');
        typingIndicatorDiv.className = 'typing-indicator';
        typingIndicatorDiv.innerHTML = '<span></span><span></span><span></span>';
        container.appendChild(typingIndicatorDiv);
        container.parentElement.scrollTop = container.parentElement.scrollHeight;
    }

    function hideTypingIndicator() {
        if (typingIndicatorDiv && typingIndicatorDiv.parentNode) {
            typingIndicatorDiv.parentNode.removeChild(typingIndicatorDiv);
            typingIndicatorDiv = null;
        }
    }

    function addChatMessage(sender, text) {
        const container = document.getElementById('chat-container');
        if (!container) return;
        const msgDiv = document.createElement('div');
        msgDiv.className = `p-3 rounded-xl max-w-[85%] text-sm shadow-sm ${
            sender === 'user' 
                ? 'bg-blue-600 text-white ml-auto rounded-tr-none' 
                : 'bg-slate-800 text-slate-100 mr-auto rounded-tl-none border border-slate-700'
        }`;
        msgDiv.innerText = text;
        container.appendChild(msgDiv);
        container.parentElement.scrollTop = container.parentElement.scrollHeight;
    }

    async function loadProducts() {
        const panel = document.getElementById('dynamic-panel');
        panel.innerHTML = '<div class="text-slate-400 text-center py-8"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading catalogue...</div>';
        try {
            const items = await apiCall('/inventory/public-list');
            if(!items || items.length === 0) {
                panel.innerHTML = '<div class="text-slate-400 text-center py-8">No retail stock items currently visible.</div>';
                return;
            }
            let html = `<div class="grid grid-cols-1 gap-4">`;
            items.forEach(p => {
                html += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex justify-between items-center shadow-sm">
                        <div>
                            <h4 class="font-bold text-white">${escapeHtml(p.description)}</h4>
                            <p class="text-xs text-slate-400 mt-0.5">SKU: ${p.id}</p>
                            <p class="text-blue-400 font-bold text-sm mt-2">₦${p.price_naira.toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs px-2 py-1 rounded-full font-medium ${p.current_qty > 5 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-amber-500/10 text-amber-400'}">
                                ${p.current_qty} units left
                            </span>
                            <button onclick="alert('Checkout integration triggered')" class="block mt-3 bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded-lg transition">Buy Now</button>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            panel.innerHTML = html;
        } catch(err) { panel.innerHTML = `<div class="text-red-400 bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-sm">Catalog failed: ${err.message}</div>`; }
    }

    async function loadMyTickets() {
        const panel = document.getElementById('dynamic-panel');
        panel.innerHTML = '<div class="text-slate-400 text-center py-8"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Syncing helpdesk records...</div>';
        try {
            const data = await apiCall('/support/tickets');
            // FIX: response is { tickets: [...] }, not direct array
            const tickets = data.tickets || [];
            if(!tickets || tickets.length === 0) {
                panel.innerHTML = '<div class="text-slate-400 text-center py-8">No structural support tickets found.</div>';
                return;
            }
            let html = `<div class="space-y-3">`;
            tickets.forEach(t => {
                html += `
                    <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-xs font-mono font-bold text-blue-400">#${t.id.slice(0,8).toUpperCase()}</span>
                            <span class="text-[10px] uppercase font-bold px-2 py-0.5 rounded ${t.status === 'open' ? 'bg-amber-500/20 text-amber-400' : 'bg-slate-700 text-slate-400'}">${t.status}</span>
                        </div>
                        <p class="text-sm font-semibold mt-1 text-white">${escapeHtml(t.subject || 'Automated Query Case')}</p>
                        <p class="text-xs text-slate-400 mt-1">Priority: <span class="capitalize text-slate-300">${t.priority}</span></p>
                    </div>`;
            });
            html += `</div>`;
            panel.innerHTML = html;
        } catch(err) { panel.innerHTML = `<div class="text-red-400 bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-sm">Failed loading tickets: ${err.message}</div>`; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---- Chat send with typing indicator ----
    function attachChatEvents() {
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('chat-send');
        if (!input || !sendBtn) {
            log('Chat input or send button not found – reattaching later');
            return false;
        }
        // Clone to remove any stuck listeners
        const newInput = input.cloneNode(true);
        input.parentNode.replaceChild(newInput, input);
        const newSend = sendBtn.cloneNode(true);
        sendBtn.parentNode.replaceChild(newSend, sendBtn);
        
        const sendMessageHandler = async () => {
            const text = newInput.value.trim();
            if(!text) return;
            newInput.value = '';
            addChatMessage('user', text);
            showTypingIndicator();   // show dots while waiting
            try {
                const data = await apiCall(`/support/chat-stream`, {
                    method: 'POST',
                    body: JSON.stringify({ session_id: 'web_' + (localStorage.getItem('pf_session') || 'default'), message: text })
                });
                hideTypingIndicator();
                addChatMessage('assistant', data.response || "No response.");
            } catch (err) {
                hideTypingIndicator();
                addChatMessage('assistant', `Error: ${err.message}`);
            }
        };
        newSend.onclick = sendMessageHandler;
        newInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessageHandler(); };
        newInput.disabled = false;
        log('Chat events attached with typing indicator');
        return true;
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        const panel = document.getElementById('dynamic-panel');
        const inputBar = document.getElementById('input-bar');
        
        if (tab === 'chat') {
            inputBar.classList.remove('hidden');
            panel.innerHTML = '<div id="chat-container" class="space-y-4"></div>';
            if (userProfile) addChatMessage('assistant', `Welcome back, ${userProfile.first_name}! How can I help you today?`);
            else addChatMessage('assistant', 'Hello! I am your business companion. How can I assist you with products or support?');
            setTimeout(() => attachChatEvents(), 50);
        } else if (tab === 'track') {
            inputBar.classList.add('hidden');
            panel.innerHTML = `
                <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl shadow-sm text-slate-200">
                    <h3 class="font-bold text-lg mb-1 text-white flex items-center gap-2"><i class="fa-solid fa-truck text-blue-500"></i> Track Your Order</h3>
                    <p class="text-xs text-slate-400 mb-4">Monitor real-time retail fulfillment and carrier tracking updates.</p>
                    <div class="space-y-3">
                        <input id="track-receipt" type="text" placeholder="Receipt Number (e.g., RCP-...)" class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500">
                        <input id="track-email" type="email" placeholder="Your Associated Email" class="w-full bg-slate-950 border border-slate-700 p-2.5 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500">
                        <button id="track-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2.5 rounded-lg w-full transition text-sm">Query Delivery State</button>
                    </div>
                    <div id="track-result" class="mt-4 text-sm"></div>
                </div>
            `;
            const trackBtn = document.getElementById('track-btn');
            if (trackBtn) {
                trackBtn.onclick = async () => {
                    const receipt = document.getElementById('track-receipt').value.trim();
                    const email = document.getElementById('track-email').value.trim();
                    if (!receipt || !email) { alert('Enter receipt number and email address'); return; }
                    const resultDiv = document.getElementById('track-result');
                    resultDiv.innerHTML = '<div class="text-slate-400 text-center py-2"><i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Checking database registries...</div>';
                    try {
                        const data = await apiCall(`/track-order?receipt_number=${receipt}&email=${email}`);
                        const statusMap = { pending: '⏳ Pending Operations', completed: '📦 Order Formulated', shipped: '🚚 Dispatched / Shipped', delivered: '✅ Successfully Delivered', cancelled: '❌ Cancelled' };
                        resultDiv.innerHTML = `
                            <div class="bg-slate-950 border border-slate-700/60 p-4 rounded-xl space-y-2 mt-2 text-slate-300 font-sans">
                                <div class="flex justify-between border-b border-slate-800 pb-1.5"><span class="text-xs text-slate-400">Order Token</span> <span class="font-mono text-white text-xs">${data.receipt_number}</span></div>
                                <div class="flex justify-between border-b border-slate-800 pb-1.5"><span class="text-xs text-slate-400">Total Charged</span> <span class="text-white font-bold text-xs">₦${data.total_amount.toLocaleString()}</span></div>
                                <div class="flex justify-between border-b border-slate-800 pb-1.5"><span class="text-xs text-slate-400">Status State</span> <span class="text-blue-400 text-xs font-semibold">${statusMap[data.shipping_status] || data.shipping_status}</span></div>
                                <div class="flex justify-between border-b border-slate-800 pb-1.5"><span class="text-xs text-slate-400">Logistics Carrier</span> <span class="text-white text-xs">${data.shipping_carrier || 'Awaiting Allocation'}</span></div>
                                <div class="flex justify-between border-b border-slate-800 pb-1.5"><span class="text-xs text-slate-400">Waybill/Tracking</span> <span class="font-mono text-xs ${data.tracking_number ? 'text-emerald-400' : 'text-slate-500'}">${data.tracking_number || 'N/A'}</span></div>
                                <div class="flex justify-between border-b border-slate-800 pb-1.5"><span class="text-xs text-slate-400">Estimated Arrival</span> <span class="text-white text-xs">${data.estimated_delivery || 'Processing Logistics'}</span></div>
                                <div class="text-[10px] text-slate-500 text-right pt-1">Logged: ${new Date(data.created_at).toLocaleString()}</div>
                            </div>
                        `;
                    } catch (err) { resultDiv.innerHTML = `<div class="text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg text-xs mt-2">${err.message}</div>`; }
                };
            }
        } else {
            inputBar.classList.add('hidden');
            if (tab === 'shop') loadProducts();
            else if (tab === 'tickets') loadMyTickets();
        }
    }

    // Event listeners
    document.getElementById('logout-btn').onclick = logout;
    document.getElementById('toggle-auth-mode').onclick = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('modal-title').innerText = isRegisterMode ? "Register Organization" : "Sign In to Workspace";
        document.getElementById('modal-submit-btn').innerText = isRegisterMode ? "Create Business Profile" : "Sign In";
        document.getElementById('toggle-auth-mode').innerText = isRegisterMode ? "Already operational? Sign In" : "Don't have an account? Register business";
        document.getElementById('reg-fields').classList.toggle('hidden', !isRegisterMode);
    };
    document.getElementById('modal-submit-btn').onclick = async () => {
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value.trim();
        const orgCode = document.getElementById('auth-org').value.trim();
        if (!email || !password) { alert('Fill out credentials fields.'); return; }
        try {
            if (isRegisterMode) {
                const first_name = document.getElementById('auth-fname').value.trim();
                const last_name = document.getElementById('auth-lname').value.trim();
                const phone = document.getElementById('auth-phone').value.trim();
                await apiCall('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, first_name, last_name, phone, invite_code: orgCode })
                });
                alert('Registration finalized successfully! Signing in...');
                isRegisterMode = false;
                document.getElementById('reg-fields').classList.add('hidden');
            }
            const loginRes = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const loginData = await loginRes.json();
            if (!loginRes.ok) throw new Error(loginData.detail || 'Login failed');
            token = loginData.access_token;
            localStorage.setItem('access_token', token);
            localStorage.setItem('refresh_token', loginData.refresh_token);
            await loadUserContext();
            hideLoginModal();
            switchTab(currentTab);
            log(`Authenticated successfully`);
        } catch(err) { alert(err.message); }
    };
    document.getElementById('demo-login-btn').onclick = demoLogin;
    document.getElementById('close-modal-btn').onclick = hideLoginModal;

    // Initialization
    (async () => {
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.onclick = () => switchTab(tab.getAttribute('data-tab'));
        });
        if (token) {
            try {
                await loadUserContext();
                switchTab('chat');
            } catch (e) {
                token = null;
                showLoginModal();
            }
        } else {
            showLoginModal();
        }
    })();
</script>
</body>
</html>
