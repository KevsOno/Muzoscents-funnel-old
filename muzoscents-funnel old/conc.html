<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevs Digital Concierge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #0F172A; font-family: system-ui, sans-serif; }
        .debug-panel { background: #1e1e2f; color: #0fc; font-family: monospace; font-size: 10px; border-top: 2px solid #f60; max-height: 120px; overflow-y: auto; padding: 6px; }
        .nav-tab { cursor: pointer; padding: 8px 12px; border-radius: 20px; transition: all 0.2s; font-size: 13px; }
        .nav-tab.active { background: #1E3A5F; color: white; }
        .nav-tab:not(.active):hover { background: #e2e8f0; }
        .message-bubble { max-width: 85%; }
        .fade-in { animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-end p-6">
<div id="widget" class="w-full max-w-md bg-slate-50 h-[750px] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
    <!-- Fixed header -->
    <div class="bg-[#1E3A5F] text-white p-4 shrink-0">
        <div class="flex justify-between items-center">
            <div>
                <h3 class="font-bold text-lg">Kevs Digital Concierge</h3>
                <p id="auth-status" class="text-xs text-slate-300">Checking...</p>
            </div>
            <div id="loyalty-banner" class="hidden bg-white/10 rounded-lg px-3 py-1 text-right">
                <div class="text-xs font-bold" id="loyalty-name">-</div>
                <div class="text-xs" id="loyalty-points">0 pts</div>
            </div>
        </div>
    </div>

    <!-- Fixed navigation tabs -->
    <div class="bg-white border-b border-slate-200 px-3 py-2 flex gap-2 overflow-x-auto shrink-0">
        <div data-tab="chat" class="nav-tab active"><i class="fa-regular fa-comment mr-1"></i> Chat</div>
        <div data-tab="loyalty" class="nav-tab"><i class="fa-solid fa-award mr-1"></i> Loyalty</div>
        <div data-tab="catalog" class="nav-tab"><i class="fa-solid fa-box mr-1"></i> Catalog</div>
        <div data-tab="tickets" class="nav-tab"><i class="fa-solid fa-ticket mr-1"></i> My Tickets</div>
    </div>

    <!-- Login area (shown if not authenticated) -->
    <div id="login-area" class="flex-1 flex flex-col items-center justify-center p-6">
        <div class="bg-white p-6 rounded-2xl shadow w-full max-w-xs">
            <button id="demo-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-bold mb-3 flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> One-Click Demo
            </button>
            <div class="text-center text-xs text-gray-400 my-2">OR</div>
            <input id="login-email" type="email" placeholder="Email" class="w-full border p-2 rounded mb-2">
            <input id="login-password" type="password" placeholder="Password" class="w-full border p-2 rounded mb-3">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-2 rounded-lg">Login</button>
            <div id="login-error" class="text-red-500 text-xs mt-2 hidden"></div>
        </div>
    </div>

    <!-- Main content area (visible after login) -->
    <div id="main-area" class="flex-1 flex flex-col hidden overflow-hidden">
        <div id="dynamic-panel" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div id="chat-container" class="space-y-4"></div>
        </div>
        <div id="input-bar" class="bg-white border-t p-3 shrink-0 hidden">
            <form id="chat-form" class="flex gap-2">
                <input id="chat-input" class="flex-1 border rounded-xl px-3 py-2 text-sm" placeholder="Ask a question...">
                <button type="submit" class="bg-[#1E3A5F] text-white px-4 py-2 rounded-xl"><i class="fa-regular fa-paper-plane"></i></button>
            </form>
            <button id="reset-chat" class="text-[10px] text-slate-400 mt-2 w-full text-center">Reset Chat</button>
        </div>
    </div>

    <div class="debug-panel shrink-0">
        <div class="text-white text-xs mb-1">🔍 DEBUG</div>
        <div id="debug"></div>
    </div>
</div>

<script>
    const BACKEND = 'https://kevsono-penafort-concierge.hf.space';
    let sessionId = crypto.randomUUID();
    let currentTab = 'chat';
    let userProfile = null;

    function log(endpoint, method, status, data, err) {
        const div = document.getElementById('debug');
        const entry = document.createElement('div');
        entry.className = 'text-xs border-b border-gray-700 py-1';
        const ts = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="text-gray-400">[${ts}]</span> <span class="${status>=200 && status<300 ? 'text-green-400' : 'text-red-400'}">${method} ${endpoint}</span> → ${status || 'ERR'}<br>${err ? `❌ ${err}` : (data ? JSON.stringify(data).substring(0,150) : '')}`;
        div.appendChild(entry);
        div.scrollTop = div.scrollHeight;
    }

    async function call(endpoint, method='GET', body=null) {
        const token = localStorage.getItem('access_token');
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(`${BACKEND}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
        let data;
        try { data = await res.json(); } catch(e) { data = { raw: await res.text() }; }
        log(endpoint, method, res.status, data);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${JSON.stringify(data)}`);
        return data;
    }

    async function validateToken() {
        const token = localStorage.getItem('access_token');
        if (!token) return false;
        try {
            await call('/auth/me');
            return true;
        } catch (e) {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_id');
            return false;
        }
    }

    async function loadUserProfile(userId) {
        try {
            const data = await call(`/support/customer-context?user_id=${userId}`);
            if (data.profile) {
                userProfile = data.profile;
                // Show loyalty banner
                const points = data.loyalty?.current_points ?? data.profile.current_points ?? 0;
                const tier = data.loyalty?.tier ?? data.profile.tier ?? 'Standard';
                document.getElementById('loyalty-banner').classList.remove('hidden');
                document.getElementById('loyalty-name').innerHTML = `${data.profile.first_name} | ${tier}`;
                document.getElementById('loyalty-points').innerHTML = `${Math.round(points)} pts`;
                return data.profile;
            }
        } catch (err) {
            log('/support/customer-context', 'GET', null, null, err.message);
        }
        return null;
    }

    function addChatMessage(role, text) {
        const container = document.getElementById('chat-container');
        if (!container) return;
        const div = document.createElement('div');
        div.className = `flex gap-2 fade-in ${role === 'user' ? 'justify-end' : ''}`;
        div.innerHTML = `
            ${role !== 'user' ? '<div class="w-8 h-8 bg-[#1E3A5F] rounded-full flex items-center justify-center text-white text-xs shrink-0">AI</div>' : ''}
            <div class="message-bubble bg-white p-3 rounded-2xl shadow-sm text-sm">${text}</div>
            ${role === 'user' ? '<div class="w-8 h-8 bg-emerald-600 rounded-full flex items-center justify-center text-white text-xs shrink-0">Me</div>' : ''}
        `;
        container.appendChild(div);
        const panel = document.getElementById('dynamic-panel');
        if (panel) panel.scrollTop = panel.scrollHeight;
    }

    async function sendChatMessage(msg) {
        addChatMessage('user', msg);
        try {
            const data = await call('/support/chat-stream', 'POST', { session_id: sessionId, message: msg });
            addChatMessage('assistant', data.response || 'No response');
        } catch (err) {
            addChatMessage('assistant', `❌ Error: ${err.message}`);
        }
    }

    async function showLoyaltyPanel(phone) {
        const panel = document.getElementById('dynamic-panel');
        try {
            const data = await call(`/loyalty/lookup?phone=${phone}`);
            panel.innerHTML = `
                <div class="bg-white rounded-xl p-4 shadow-sm border">
                    <h3 class="font-bold text-lg mb-2">Loyalty Details</h3>
                    <div class="space-y-2 text-sm">
                        <p><span class="text-slate-500">Name:</span> ${data.first_name}</p>
                        <p><span class="text-slate-500">Tier:</span> ${data.tier}</p>
                        <p><span class="text-slate-500">Points:</span> ${data.current_points}</p>
                        <p><span class="text-slate-500">Membership ID:</span> ${data.membership_id}</p>
                    </div>
                </div>
            `;
        } catch (err) {
            panel.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-xl">Failed to load loyalty: ${err.message}</div>`;
        }
    }

    async function showCatalogPanel() {
        const panel = document.getElementById('dynamic-panel');
        try {
            const items = await call('/inventory/public-list');
            if (!items.length) {
                panel.innerHTML = `<div class="bg-white rounded-xl p-4">No products found.</div>`;
                return;
            }
            let html = `<div class="bg-white rounded-xl p-4 shadow-sm border"><h3 class="font-bold text-lg mb-3">Product Catalog</h3><div class="space-y-3">`;
            items.forEach(i => {
                html += `<div class="border-b pb-2"><div class="font-medium">${i.description}</div><div class="text-sm text-slate-500">₦${Number(i.price_naira).toLocaleString()} | Stock: ${i.current_qty}</div></div>`;
            });
            html += `</div></div>`;
            panel.innerHTML = html;
        } catch (err) {
            panel.innerHTML = `<div class="bg-red-50 p-4 rounded-xl">Error: ${err.message}</div>`;
        }
    }

    async function showTicketsPanel() {
        const panel = document.getElementById('dynamic-panel');
        try {
            const data = await call('/support/tickets?status=open');
            if (!data.tickets || data.tickets.length === 0) {
                panel.innerHTML = `<div class="bg-white rounded-xl p-4">No open tickets.</div>`;
                return;
            }
            let html = `<div class="bg-white rounded-xl p-4 shadow-sm border"><h3 class="font-bold text-lg mb-3">Open Tickets</h3><div class="space-y-3">`;
            data.tickets.forEach(t => {
                html += `<div class="border p-3 rounded-lg"><div class="font-semibold">${t.subject}</div><div class="text-xs text-slate-500">Status: ${t.status} | Priority: ${t.priority}</div><div class="text-xs">Created: ${new Date(t.created_at).toLocaleString()}</div></div>`;
            });
            html += `</div></div>`;
            panel.innerHTML = html;
        } catch (err) {
            panel.innerHTML = `<div class="bg-red-50 p-4 rounded-xl">Error loading tickets: ${err.message}</div>`;
        }
    }

    async function doLogin(email, password) {
        try {
            const data = await call('/auth/login', 'POST', { email, password });
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('user_id', data.user_id);
            return true;
        } catch (err) {
            document.getElementById('login-error').innerText = err.message;
            document.getElementById('login-error').classList.remove('hidden');
            return false;
        }
    }

    async function demoLogin() {
        const btn = document.getElementById('demo-btn');
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Logging...';
        btn.disabled = true;
        const ok = await doLogin('demo@kevsdigital.com', 'KevsDemo2026!');
        if (ok) window.location.reload();
        else {
            btn.innerHTML = orig;
            btn.disabled = false;
        }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        const panel = document.getElementById('dynamic-panel');
        const inputBar = document.getElementById('input-bar');
        if (tab === 'chat') {
            inputBar.classList.remove('hidden');
            if (!document.getElementById('chat-container')) {
                panel.innerHTML = '<div id="chat-container" class="space-y-4"></div>';
                if (userProfile) {
                    addChatMessage('assistant', `Welcome back, ${userProfile.first_name}! How can I help you today?`);
                } else {
                    addChatMessage('assistant', 'Chat ready. Ask me anything.');
                }
            } else {
                // restore existing messages
                const oldContainer = document.getElementById('chat-container');
                if (oldContainer && oldContainer.children.length) {
                    panel.innerHTML = '<div id="chat-container" class="space-y-4"></div>';
                    const newContainer = document.getElementById('chat-container');
                    while (oldContainer.firstChild) newContainer.appendChild(oldContainer.firstChild);
                } else if (userProfile) {
                    panel.innerHTML = '<div id="chat-container" class="space-y-4"></div>';
                    addChatMessage('assistant', `Welcome back, ${userProfile.first_name}! How can I help you today?`);
                } else {
                    panel.innerHTML = '<div id="chat-container" class="space-y-4"></div>';
                    addChatMessage('assistant', 'Chat ready. Ask me anything.');
                }
            }
        } else {
            inputBar.classList.add('hidden');
            if (tab === 'loyalty') {
                const phone = prompt('Enter phone number for loyalty lookup:', userProfile?.phone || '07012345678');
                if (phone) showLoyaltyPanel(phone);
                else if (userProfile?.phone) showLoyaltyPanel(userProfile.phone);
                else showLoyaltyPanel('07012345678');
            } else if (tab === 'catalog') showCatalogPanel();
            else if (tab === 'tickets') showTicketsPanel();
        }
    }

    async function init() {
        const valid = await validateToken();
        if (valid) {
            const userId = localStorage.getItem('user_id');
            if (userId) {
                await loadUserProfile(userId);
            }
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('main-area').classList.remove('hidden');
            document.getElementById('auth-status').innerHTML = `✅ Welcome, ${userProfile?.first_name || 'User'}`;
            switchTab('chat');
        } else {
            document.getElementById('login-area').classList.remove('hidden');
            document.getElementById('main-area').classList.add('hidden');
            document.getElementById('auth-status').innerHTML = '🔐 Not logged in';
        }
    }

    // Event listeners
    document.getElementById('demo-btn')?.addEventListener('click', demoLogin);
    document.getElementById('login-btn')?.addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const pwd = document.getElementById('login-password').value;
        if (!email || !pwd) {
            document.getElementById('login-error').innerText = 'Enter email and password';
            document.getElementById('login-error').classList.remove('hidden');
            return;
        }
        if (await doLogin(email, pwd)) window.location.reload();
    });
    document.getElementById('chat-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const inp = document.getElementById('chat-input');
        const val = inp.value.trim();
        if (!val) return;
        inp.value = '';
        await sendChatMessage(val);
    });
    document.getElementById('reset-chat')?.addEventListener('click', () => {
        const container = document.getElementById('chat-container');
        if (container) container.innerHTML = '';
        sessionId = crypto.randomUUID();
        addChatMessage('assistant', 'Chat reset. Start fresh.');
    });
    document.querySelectorAll('.nav-tab').forEach(el => {
        el.addEventListener('click', () => switchTab(el.dataset.tab));
    });

    init();
</script>
</body>
</html>
