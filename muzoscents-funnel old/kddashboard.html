<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100 p-4">

<!-- ========== GLOBAL NAVIGATION (Kevs bOS) ========== -->
<div id="kevs-nav-container"></div>
<script>
(function() {
    const APP_NAME = 'Kevs<span class="text-orange-500">BI</span>';
    const LOGIN_URL = '/kdsiginin';
    const navItems = [
        { path: '/kdbi',          name: 'Dashboard', icon: 'fa-chart-line', title: 'Marketing metrics, leads & AI strategy' },
        { path: '/kdpos',         name: 'POS',       icon: 'fa-cash-register', title: 'Multi‑tab sales, SKU search & online payments' },
        { path: '/kdfulfillment', name: 'Fulfillment', icon: 'fa-truck-fast', title: 'Order shipping, tracking & dispatch' },
        { path: '/kdsupport',     name: 'Support',   icon: 'fa-headset', title: 'Ticket management & customer context' },
        { path: '/kddashboard',   name: 'Exec',      icon: 'fa-chart-simple', title: 'Executive revenue & profit overview' }
    ];
    const adminItem = { path: '/kdadmin', name: 'Admin', icon: 'fa-shield-alt', title: 'Inventory & bulk product management (admin only)' };

    function getUserRole() {
        try {
            const role = localStorage.getItem('user_role');
            return role === 'admin' ? 'admin' : null;
        } catch(e) { return null; }
    }

    function buildNavbar() {
        const currentPath = window.location.pathname;
        const isAdmin = getUserRole() === 'admin';
        let linksHtml = '';
        navItems.forEach(item => {
            const isActive = currentPath === item.path;
            const activeClass = isActive ? 'bg-white/20 text-white' : 'text-white/80 hover:bg-white/10';
            linksHtml += `
                <a href="${item.path}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeClass}" title="${item.title}">
                    <i class="fa-solid ${item.icon} w-4"></i> ${item.name}
                </a>
            `;
        });
        if (isAdmin) {
            const isActive = currentPath === adminItem.path;
            const activeClass = isActive ? 'bg-white/20 text-white' : 'text-white/80 hover:bg-white/10';
            linksHtml += `
                <a href="${adminItem.path}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeClass}" title="${adminItem.title}">
                    <i class="fa-solid ${adminItem.icon} w-4"></i> ${adminItem.name}
                </a>
            `;
        }
        let userName = 'User';
        try {
            const profileStr = localStorage.getItem('user_profile_display');
            if (profileStr) userName = profileStr;
        } catch(e) {}
        return `
            <div class="bg-[#1E3A5F] text-white shadow-md sticky top-0 z-40">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex flex-wrap items-center justify-between py-3 gap-3">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-chart-pie text-orange-400 text-xl"></i>
                            <span class="text-xl font-bold tracking-tight">${APP_NAME}</span>
                            <span class="hidden sm:inline-block text-xs bg-white/20 px-2 py-0.5 rounded-full">bOS</span>
                        </div>
                        <div class="hidden md:flex items-center gap-1 flex-wrap">
                            ${linksHtml}
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/10 px-3 py-1.5 rounded-full hidden sm:inline-block">
                                <i class="fa-regular fa-user mr-1"></i> <span id="nav-user-name">${escapeHtml(userName)}</span>
                            </span>
                            <button id="global-logout-btn" class="bg-red-500/80 hover:bg-red-600 text-white text-sm px-3 py-1.5 rounded-lg transition flex items-center gap-1">
                                <i class="fa-solid fa-sign-out-alt"></i> <span class="hidden sm:inline">Logout</span>
                            </button>
                        </div>
                    </div>
                    <div class="md:hidden flex overflow-x-auto pb-2 gap-1 snap-x">
                        ${linksHtml}
                    </div>
                </div>
            </div>
        `;
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    async function globalLogout() {
        const BACKEND = 'https://kevsono-kevs-digital-bos.hf.space';
        const token = localStorage.getItem('access_token');
        if (token) {
            try {
                await fetch(`${BACKEND}/auth/logout`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } });
            } catch(e) {}
        }
        localStorage.removeItem('access_token'); localStorage.removeItem('refresh_token');
        localStorage.removeItem('user_role'); localStorage.removeItem('user_profile_display');
        window.location.href = LOGIN_URL;
    }
    async function updateUserDisplay() {
        const token = localStorage.getItem('access_token');
        if (!token) return;
        try {
            const res = await fetch('https://kevsono-kevs-digital-bos.hf.space/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const me = await res.json();
                const contextRes = await fetch(`https://kevsono-kevs-digital-bos.hf.space/support/customer-context?target_user_id=${me.user_id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (contextRes.ok) {
                    const context = await contextRes.json();
                    const name = context.profile?.first_name || 'Executive';
                    localStorage.setItem('user_profile_display', name);
                    const nameSpan = document.getElementById('nav-user-name');
                    if (nameSpan) nameSpan.innerText = name;
                }
            }
        } catch(e) {}
    }
    function initNavigation() {
        const container = document.getElementById('kevs-nav-container');
        if (container) {
            container.innerHTML = buildNavbar();
            const logoutBtn = document.getElementById('global-logout-btn');
            if (logoutBtn) logoutBtn.addEventListener('click', globalLogout);
            updateUserDisplay();
        }
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initNavigation);
    else initNavigation();
})();
</script>
<!-- ========== END GLOBAL NAVIGATION ========== -->

<div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">📊 Executive Dashboard</h1>
        <div class="flex gap-2">
            <a href="/kdconc" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">Shop</a>
            <a href="/kdadmin" class="bg-green-500 text-white px-3 py-1 rounded text-sm">Admin</a>
        </div>
    </div>

    <div class="bg-white rounded shadow p-4 mb-6 flex flex-wrap gap-4 items-end">
        <div><label class="block text-sm">Start Date</label><input type="date" id="start-date" class="border rounded p-2"></div>
        <div><label class="block text-sm">End Date</label><input type="date" id="end-date" class="border rounded p-2"></div>
        <button id="update-dates" class="bg-blue-600 text-white px-4 py-2 rounded">Update</button>
        <div class="ml-auto"><span class="text-sm text-gray-500">Default: last 30 days</span></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded shadow"><div class="text-gray-500 text-sm">Total Revenue</div><div id="kpi-revenue" class="text-2xl font-bold">₦0</div></div>
        <div class="bg-white p-4 rounded shadow"><div class="text-gray-500 text-sm">COGS</div><div id="kpi-cogs" class="text-2xl font-bold">₦0</div></div>
        <div class="bg-white p-4 rounded shadow"><div class="text-gray-500 text-sm">Gross Profit</div><div id="kpi-profit" class="text-2xl font-bold">₦0</div></div>
        <div class="bg-white p-4 rounded shadow"><div class="text-gray-500 text-sm">Inventory Value</div><div id="kpi-inventory-value" class="text-2xl font-bold">₦0</div></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="bg-white p-4 rounded shadow"><canvas id="revenueChart" height="250"></canvas></div>
        <div class="bg-white p-4 rounded shadow"><canvas id="profitChart" height="250"></canvas></div>
    </div>

    <div class="bg-white rounded shadow p-4 mb-6">
        <h2 class="text-xl font-semibold mb-3">Expenditure Breakdown (COGS by Product)</h2>
        <div id="expenditure-table" class="overflow-x-auto"></div>
    </div>

    <div class="bg-white rounded shadow p-4">
        <h2 class="text-xl font-semibold mb-3">🏆 Top Selling Products (units)</h2>
        <div id="top-products" class="overflow-x-auto"></div>
    </div>
</div>

<script>
    const API_BASE = "https://kevsono-kevs-digital-bos.hf.space";
    let token = localStorage.getItem('access_token');
    let revenueChart, profitChart;

    async function apiCall(endpoint, options = {}, retry = true) {
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers,
        };
        if (token) headers['Authorization'] = `Bearer ${token}`;

        const response = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers,
        });

        if (response.status === 401 && retry) {
            const refreshed = await refreshToken();
            if (refreshed) {
                return apiCall(endpoint, options, false);
            } else {
                localStorage.clear();
                window.location.href = '/kdsiginin';
                throw new Error('Session expired');
            }
        }
        if (!response.ok) {
            const text = await response.text();
            throw new Error(`API error ${response.status}: ${text}`);
        }
        return response.json();
    }

    async function refreshToken() {
        const refreshToken = localStorage.getItem('refresh_token');
        if (!refreshToken) return false;
        try {
            const res = await fetch(`${API_BASE}/auth/refresh`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: refreshToken })
            });
            if (res.ok) {
                const data = await res.json();
                token = data.access_token;
                localStorage.setItem('access_token', token);
                localStorage.setItem('refresh_token', data.refresh_token);
                return true;
            }
        } catch (e) {}
        return false;
    }

    const today = new Date();
    const defaultEnd = today.toISOString().slice(0,10);
    const defaultStart = new Date(today.setDate(today.getDate()-30)).toISOString().slice(0,10);
    document.getElementById('start-date').value = defaultStart;
    document.getElementById('end-date').value = defaultEnd;

    async function loadDashboard() {
        const start = document.getElementById('start-date').value;
        const end = document.getElementById('end-date').value;
        if (!start || !end) return;

        try {
            const summary = await apiCall(`/sales/summary?start_date=${start}&end_date=${end}`);
            document.getElementById('kpi-revenue').innerHTML = `₦${summary.total_revenue.toLocaleString()}`;
            document.getElementById('kpi-cogs').innerHTML = `₦${summary.total_cogs.toLocaleString()}`;
            document.getElementById('kpi-profit').innerHTML = `₦${summary.total_profit.toLocaleString()}`;

            const inventory = await apiCall('/inventory');
            let inventoryValue = 0;
            for (let item of inventory) {
                inventoryValue += (item.price_naira * (item.current_qty || 0));
            }
            document.getElementById('kpi-inventory-value').innerHTML = `₦${inventoryValue.toLocaleString()}`;

            const trend = await apiCall(`/sales/trend?days=30`);
            const labels = trend.map(t => t.date);
            const revenues = trend.map(t => t.revenue);
            if (revenueChart) revenueChart.destroy();
            revenueChart = new Chart(document.getElementById('revenueChart'), {
                type: 'line',
                data: { labels, datasets: [{ label: 'Daily Revenue (₦)', data: revenues, borderColor: '#3b82f6', fill: false }] }
            });
            if (profitChart) profitChart.destroy();
            profitChart = new Chart(document.getElementById('profitChart'), {
                type: 'line',
                data: { labels, datasets: [{ label: 'Daily Profit (est.)', data: revenues.map(r => r * 0.25), borderColor: '#10b981', fill: false }] }
            });

            const productStats = await apiCall(`/sales/product-stats?start_date=${start}&end_date=${end}`);
            const cogsByProduct = productStats.cogs_by_product || {};
            const qtyByProduct = productStats.qty_by_product || {};

            let expendHtml = '<table class="min-w-full"><thead><tr><th>Product</th><th>Total COGS (₦)</th></tr></thead><tbody>';
            for (let [prod, cogs] of Object.entries(cogsByProduct)) {
                expendHtml += `<tr><td class="p-2">${escapeHtml(prod)}</td><td>₦${cogs.toLocaleString()}</td></tr>`;
            }
            expendHtml += '</tbody></table>';
            document.getElementById('expenditure-table').innerHTML = expendHtml || '<p>No sales in period.</p>';

            const top = Object.entries(qtyByProduct).sort((a,b) => b[1]-a[1]).slice(0,10);
            let topHtml = '<table class="min-w-full"><thead><tr><th>Product</th><th>Units Sold</th></tr></thead><tbody>';
            for (let [prod, qty] of top) {
                topHtml += `<tr><td class="p-2">${escapeHtml(prod)}</td><td>${qty}</td></tr>`;
            }
            topHtml += '</tbody></table>';
            document.getElementById('top-products').innerHTML = topHtml;
        } catch (err) {
            console.error('Dashboard load error:', err);
            document.getElementById('expenditure-table').innerHTML = '<p class="text-red-500">Failed to load data. Check that you added the /sales/product-stats endpoint to main.py.</p>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    document.getElementById('update-dates').onclick = () => loadDashboard();

    (async () => {
        if (!token) {
            window.location.href = '/kdsiginin';
            return;
        }
        await loadDashboard();
    })();
</script>
</body>
</html>
