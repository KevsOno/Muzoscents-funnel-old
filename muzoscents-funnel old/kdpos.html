<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kevs POS Pro | Multi‑Tab · SKU Search · Scanner Ready</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tab-active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }
        .tab-inactive {
            background-color: #f3f4f6;
            color: #1f2937;
            border-color: #d1d5db;
        }
        .tab-inactive:hover {
            background-color: #e5e7eb;
        }
        .product-card {
            transition: all 0.15s ease;
        }
        .product-card:active {
            transform: scale(0.98);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .loading-spinner {
            border: 2px solid #e5e7eb;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .transition-smooth {
            transition: all 0.2s ease;
        }
        .customer-suggestion {
            cursor: pointer;
            transition: background 0.1s;
        }
        .customer-suggestion:hover {
            background-color: #e0f2fe;
        }
        .dummy-autofill {
            position: absolute;
            left: -9999px;
            top: -9999px;
            height: 0;
            width: 0;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }
        input[readonly] {
            background-color: white;
            cursor: text;
        }
        #product-search.scanner-active {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px #22c55e40;
        }
        #scroll-sentinel {
            height: 4px;
            width: 100%;
            background: transparent;
        }
        .loading-more {
            text-align: center;
            padding: 12px;
            color: #6b7280;
            font-size: 0.9rem;
        }
        /* cart quantity controls */
        .qty-btn {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.1s;
        }
        .qty-btn:hover {
            background: #e5e7eb;
        }
        .qty-input {
            width: 40px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 2px 0;
            font-size: 0.85rem;
        }
        .qty-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px #93c5fd;
        }
    </style>
</head>

    <!-- ========== GLOBAL NAVIGATION ========== -->
    <div id="kevs-nav-container"></div>
    <script>
        (function() {
            const APP_NAME = 'Kevs<span class="text-orange-500">BI</span>';
            const LOGIN_URL = '/kdsiginin';
            const navItems = [
                { path: '/kdbi', name: 'Dashboard', icon: 'fa-chart-line', title: 'Marketing metrics, leads & AI strategy',
                    roles: ['owner', 'admin', 'sales_rep', 'finance'] },
                { path: '/kdpos', name: 'POS', icon: 'fa-cash-register', title: 'Multi‑tab sales, SKU search & loyalty',
                    roles: ['owner', 'admin', 'sales_rep'] },
                { path: '/kdfulfillment', name: 'Fulfillment', icon: 'fa-truck-fast',
                    title: 'Order shipping, tracking & dispatch', roles: ['owner', 'admin', 'logistics'] },
                { path: '/kdsupport', name: 'Support', icon: 'fa-headset', title: 'Ticket management & customer context',
                    roles: ['owner', 'admin', 'support'] },
                { path: '/kddashboard', name: 'Exec', icon: 'fa-chart-simple', title: 'Executive revenue & profit overview',
                    roles: ['owner', 'admin', 'finance'] },
                { path: '/kdadmin', name: 'Inventory', icon: 'fa-boxes', title: 'Manage products, stock, bulk CSV upload',
                    roles: ['owner', 'admin', 'inventory_manager'] },
                { path: '/kdteam', name: 'Team', icon: 'fa-users', title: 'Invite & manage team members',
                    roles: ['owner', 'admin'] },
                { path: '/kdknowledge', name: 'Knowledge', icon: 'fa-database',
                    title: 'Manage AI knowledge base documents', roles: ['owner', 'admin'] }
            ];

            function getUserRole() {
                try { return localStorage.getItem('user_role') || 'customer'; } catch (e) { return 'customer'; }
            }

            function canAccess(requiredRoles) {
                return requiredRoles.includes(getUserRole());
            }

            function buildNavbar() {
                const currentPath = window.location.pathname;
                let linksHtml = '';
                navItems.forEach(item => {
                    if (!canAccess(item.roles)) return;
                    const isActive = currentPath === item.path;
                    const activeClass = isActive ? 'bg-white/20 text-white' : 'text-white/80 hover:bg-white/10';
                    linksHtml += `
                            <a href="${item.path}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeClass}" title="${item.title}">
                                <i class="fa-solid ${item.icon} w-4"></i> ${item.name}
                            </a>
                        `;
                });
                let userName = 'User';
                try {
                    const profileStr = localStorage.getItem('user_profile_display');
                    if (profileStr) userName = profileStr;
                } catch (e) {}
                return `
                        <div class="bg-[#1E3A5F] text-white shadow-md sticky top-0 z-40">
                            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div class="flex flex-wrap items-center justify-between py-3 gap-3">
                                    <div class="flex items-center gap-2">
                                        <i class="fa-solid fa-chart-pie text-orange-400 text-xl"></i>
                                        <span class="text-xl font-bold tracking-tight">${APP_NAME}</span>
                                        <span class="hidden sm:inline-block text-xs bg-white/20 px-2 py-0.5 rounded-full">bOS</span>
                                    </div>
                                    <div class="hidden md:flex items-center gap-1 flex-wrap">${linksHtml}</div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-xs bg-white/10 px-3 py-1.5 rounded-full hidden sm:inline-block">
                                            <i class="fa-regular fa-user mr-1"></i> <span id="nav-user-name">${escapeHtml(userName)}</span>
                                        </span>
                                        <button id="global-logout-btn" class="bg-red-500/80 hover:bg-red-600 text-white text-sm px-3 py-1.5 rounded-lg transition flex items-center gap-1">
                                            <i class="fa-solid fa-sign-out-alt"></i> <span class="hidden sm:inline">Logout</span>
                                        </button>
                                    </div>
                                </div>
                                <div class="md:hidden flex overflow-x-auto pb-2 gap-1 snap-x">${linksHtml}</div>
                            </div>
                        </div>
                    `;
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' } [m]));
            }

            async function globalLogout() {
                const BACKEND = 'https://kevsono-kevs-digital-bos.hf.space';
                const token = localStorage.getItem('access_token');
                if (token) {
                    try {
                        await fetch(`${BACKEND}/auth/logout`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                        });
                    } catch (e) {}
                }
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                localStorage.removeItem('user_role');
                localStorage.removeItem('user_profile_display');
                window.location.href = LOGIN_URL;
            }

            async function updateUserDisplay() {
                const token = localStorage.getItem('access_token');
                if (!token) return;
                try {
                    const res = await fetch('https://kevsono-kevs-digital-bos.hf.space/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const me = await res.json();
                        const contextRes = await fetch(
                            `https://kevsono-kevs-digital-bos.hf.space/support/customer-context?target_user_id=${me.user_id}`,
                        { headers: { 'Authorization': `Bearer ${token}` } });
                        if (contextRes.ok) {
                            const context = await contextRes.json();
                            const name = context.profile?.first_name || 'User';
                            localStorage.setItem('user_profile_display', name);
                            const nameSpan = document.getElementById('nav-user-name');
                            if (nameSpan) nameSpan.innerText = name;
                        }
                    }
                } catch (e) {}
            }

            function initNavigation() {
                const container = document.getElementById('kevs-nav-container');
                if (container) {
                    container.innerHTML = buildNavbar();
                    const logoutBtn = document.getElementById('global-logout-btn');
                    if (logoutBtn) logoutBtn.addEventListener('click', globalLogout);
                    updateUserDisplay();
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initNavigation);
            } else {
                initNavigation();
            }
        })();
    </script>
    <!-- ========== END GLOBAL NAVIGATION ========== -->

    <script>
        const BACKEND = 'https://kevsono-kevs-digital-bos.hf.space';
        let token = localStorage.getItem('access_token');
        let products = [];
        let allCustomers = [];
        let posSearchTerm = '';
        let posPage = 1;
        const POS_PAGE_SIZE = 200;
        let posTotalItems = 0;
        let posIsLoading = false;
        let posHasMore = true;
        let activeTab = 1;
        let abortController = null;

        const tabState = {
            1: { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '',
            loyaltyUserId: null, pointsBalance: 0, pointsRedeemed: 0 },
            2: { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '',

        };

        const productContainer = document.getElementById('product-list');
        const emptyMsgDiv = document.getElementById('product-list-empty');
        const cartContainer = document.getElementById('cart-items');
        const cartTotalSpan = document.getElementById('cart-total');
        const paymentMethodSelect = document.getElementById('payment-method');
        const customerNameInput = document.getElementById('customer-name');
        const customerPhoneInput = document.getElementById('customer-phone');
        const customerEmailInput = document.getElementById('customer-email');
        const activeCustomerLabel = document.getElementById('active-customer-label');
        const tabBadge = document.getElementById('tab-badge');
        const tab1Btn = document.getElementById('tab1-btn');
        const tab2Btn = document.getElementById('tab2-btn');
        const checkoutBtn = document.getElementById('checkout-btn');

        const suggestionsDiv = document.getElementById('customer-suggestions');
        const customerInfoDiv = document.getElementById('customer-info');

        const customerPointsSpan = document.getElementById('customer-points');

        const redeemPointsInput = document.getElementById('redeem-points-input');
        const applyPointsBtn = document.getElementById('apply-points-btn');
        const scannerHint = document.getElementById('search-scanner-hint');
        const loadingMoreDiv = document.getElementById('loading-more');
        let observer = null;

        // ─── SCANNER DETECTION (does NOT block normal typing) ───
        let scanBuffer = '';
        let scanTimer = null;
        let lastKeyTime = 0;
        let isScanning = false;
        let searchDebounceTimer = null;

        // ─── TOAST ───
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className =
                `px-4 py-2 rounded-lg shadow-lg text-white ${type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'} mb-2 text-sm flex items-center gap-2`;
            const icon = type === 'success' ? 'fa-circle-check' : type === 'error' ? 'fa-circle-exclamation' :
                'fa-info-circle';
            toast.innerHTML = `<i class="fa-solid ${icon}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3800);
        }

        // ─── API (with abort support) ───
        async function apiCall(endpoint, method = 'GET', body = null, retry = true, signal = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const selectedOrgId = localStorage.getItem('selected_org_id');
            if (selectedOrgId) headers['X-Selected-Org-Id'] = selectedOrgId;
            const options = { method, headers, signal };
            if (body) options.body = JSON.stringify(body);
            let res = await fetch(`${BACKEND}${endpoint}`, options);
            if (res.status === 401 && retry) {
                const refresh = localStorage.getItem('refresh_token');
                if (refresh) {
                    try {
                        const refreshRes = await fetch(`${BACKEND}/auth/refresh`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh_token: refresh })
                        });
                        if (refreshRes.ok) {
                            const { access_token, refresh_token } = await refreshRes.json();
                            localStorage.setItem('access_token', access_token);
                            localStorage.setItem('refresh_token', refresh_token);
                            token = access_token;
                            return apiCall(endpoint, method, body, false, signal);
                        }
                    } catch (e) {}
                }
                showLoginModal();
                throw new Error('Session expired');
            }
            if (!res.ok) {
                const err = await res.json().catch(() => ({ detail: 'Request error' }));
                throw new Error(err.detail || 'API error');
            }
            return res.json();
        }

        function showLoginModal() { document.getElementById('auth-modal').classList.remove('hidden'); }

        function hideLoginModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        // ─── LOAD PRODUCTS (with abort, min 2 chars) ───
        async function loadPOSProducts(reset = true) {
            const trimmed = posSearchTerm.trim();
            if (trimmed.length < 2) {
                products = [];
                productContainer.innerHTML = '';
                emptyMsgDiv.classList.add('hidden');
                posPage = 1;
                posHasMore = true;
                posTotalItems = 0;
                if (observer) observer.disconnect();
                if (abortController) abortController.abort();
                return;
            }

            if (reset) {
                posPage = 1;
                posTotalItems = 0;
                posHasMore = true;
                products = [];
                productContainer.innerHTML = '';
                emptyMsgDiv.classList.add('hidden');
                const oldSentinel = document.getElementById('scroll-sentinel');
                if (oldSentinel) oldSentinel.remove();
                if (observer) observer.disconnect();
                if (abortController) abortController.abort();
                abortController = new AbortController();
            }
            if (posIsLoading || !posHasMore) return;
            posIsLoading = true;
            loadingMoreDiv.classList.remove('hidden');

            const offset = (posPage - 1) * POS_PAGE_SIZE;
            let url = `/inventory/pos?limit=${POS_PAGE_SIZE}&offset=${offset}&q=${encodeURIComponent(trimmed)}`;

            try {
                const data = await apiCall(url, 'GET', null, true, abortController.signal);
                const newItems = data.items || [];
                posTotalItems = data.total || 0;
                posHasMore = (posPage * POS_PAGE_SIZE) < posTotalItems;

                if (reset) products = newItems;
                else products = products.concat(newItems);

                appendProductCards(newItems);
                posPage++;
                return products; // return for auto‑add logic
            } catch (err) {
                if (err.name === 'AbortError') return;
                showToast('Failed to load products: ' + err.message, 'error');
            } finally {
                posIsLoading = false;
                loadingMoreDiv.classList.add('hidden');
                if (posHasMore) {
                    const sentinel = document.createElement('div');
                    sentinel.id = 'scroll-sentinel';
                    sentinel.className = 'h-4 w-full';
                    productContainer.appendChild(sentinel);
                    observeSentinel();
                } else {
                    if (products.length > 0) {
                        const endMsg = document.createElement('div');
                        endMsg.className = 'col-span-full text-center py-4 text-gray-400 text-sm';
                        endMsg.innerText = '— End of catalog —';
                        productContainer.appendChild(endMsg);
                    }
                }
            }
        }

        function appendProductCards(items) {
            if (!items || items.length === 0) {
                if (products.length === 0) emptyMsgDiv.classList.remove('hidden');
                return;
            }
            emptyMsgDiv.classList.add('hidden');
            items.forEach(p => {
                const skuDisplay = getDisplaySku(p);
                const stock = p.current_qty ?? 0;
                const price = p.price_naira ?? 0;
                const descSafe = escapeHtml(p.description || 'Unnamed product');
                const card = document.createElement('button');
                card.className =
                    'product-card bg-gray-50 p-3 rounded-xl text-left hover:bg-blue-50 border border-gray-200 transition shadow-sm';
                card.innerHTML = `
                        <div class="font-semibold text-gray-800">${descSafe}</div>
                        <div class="text-xs text-gray-500 font-mono mt-0.5">📟 ${escapeHtml(skuDisplay)}</div>
                        <div class="text-md font-bold text-blue-700 mt-1">₦${price.toLocaleString()}</div>
                        <div class="text-xs text-gray-500 mt-1">📦 Stock: ${stock}</div>
                    `;
                card.onclick = () => addToCart(p.id, p.description || 'Product', price, stock, skuDisplay);
                productContainer.appendChild(card);
            });
        }

        function getDisplaySku(product) {
            if (product.sku) return product.sku;
            if (product.sku_code) return product.sku_code;
            return `ID:${product.id}`;
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ?
                '&lt;' : '&gt;'); }

        function observeSentinel() {
            if (observer) observer.disconnect();
            const sentinel = document.getElementById('scroll-sentinel');
            if (!sentinel) return;
            observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && posHasMore && !posIsLoading) {
                    loadPOSProducts(false);
                }
            }, { root: null, rootMargin: '0px 0px 100px 0px' });
            observer.observe(sentinel);
        }

        // ─── SEARCH INPUT (debounced, min 2 chars) ───
        searchInput.addEventListener('input', function(e) {
            if (isScanning) return;
            clearTimeout(searchDebounceTimer);
            const val = this.value.trim();
            searchDebounceTimer = setTimeout(() => {
                posSearchTerm = val;
                if (val.length === 0) {
                    products = [];
                    productContainer.innerHTML = '';
                    emptyMsgDiv.classList.add('hidden');
                    posPage = 1;
                    posHasMore = true;
                    posTotalItems = 0;
                    if (abortController) abortController.abort();
                    return;
                }
                if (val.length >= 2) {
                    if (abortController) abortController.abort();
                    loadPOSProducts(true);
                }
            }, 500);
        });

        // ─── KEYDOWN: scanner detection ───
        searchInput.addEventListener('keydown', function(e) {
            const now = Date.now();
            const timeDiff = lastKeyTime ? now - lastKeyTime : 0;
            lastKeyTime = now;

            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                if (timeDiff < 60 && timeDiff > 0) {
                    e.preventDefault();
                    if (!isScanning) {
                        isScanning = true;
                        scanBuffer = '';
                        searchInput.classList.add('scanner-active');
                        scannerHint.classList.remove('hidden');
                    }
                    scanBuffer += e.key;
                    clearTimeout(scanTimer);
                    scanTimer = setTimeout(async () => {
                        if (scanBuffer.length > 0) {
                            searchInput.value = scanBuffer;
                            posSearchTerm = scanBuffer;
                            if (scanBuffer.length >= 2) {
                                if (abortController) abortController.abort();
                                await loadPOSProducts(true);
                                // Auto‑add if exactly one match
                                if (products.length === 1) {
                                    const p = products[0];
                                    addToCart(p.id, p.description || 'Product', p.price_naira || 0, p
                                        .current_qty || 0, getDisplaySku(p));
                                } else if (products.length === 0) {
                                    showToast('Product not found', 'error');
                                } else {
                                    showToast(`${products.length} products found`, 'info');
                                }
                            } else {
                                products = [];
                                productContainer.innerHTML = '';
                                emptyMsgDiv.classList.add('hidden');
                            }
                        }
                        isScanning = false;
                        scanBuffer = '';
                        searchInput.classList.remove('scanner-active');
                        scannerHint.classList.add('hidden');
                    }, 150);
                    return;
                }
                // normal typing – reset scanner
                if (isScanning) {
                    isScanning = false;
                    scanBuffer = '';
                    clearTimeout(scanTimer);
                    searchInput.classList.remove('scanner-active');
                    scannerHint.classList.add('hidden');
                }
            } else {
                if (isScanning) {
                    isScanning = false;
                    scanBuffer = '';
                    clearTimeout(scanTimer);
                    searchInput.classList.remove('scanner-active');
                    scannerHint.classList.add('hidden');
                }
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = searchInput.value.trim();
                    if (val.length >= 2) {
                        posSearchTerm = val;
                        if (abortController) abortController.abort();
                        loadPOSProducts(true).then(() => {
                            if (products.length === 1) {
                                const p = products[0];
                                addToCart(p.id, p.description || 'Product', p.price_naira || 0, p
                                    .current_qty || 0, getDisplaySku(p));
                            } else if (products.length === 0) {
                                showToast('Product not found', 'error');
                            } else {
                                showToast(`${products.length} products found`, 'info');
                            }
                        });
                    } else {
                        products = [];
                        productContainer.innerHTML = '';
                        emptyMsgDiv.classList.add('hidden');
                    }
                }
            }
        });

        // ─── CUSTOMER SEARCH ───
        function filterCustomers(searchText) {
            if (!searchText.trim()) return [];
            const term = searchText.trim().toLowerCase();
            return allCustomers.filter(c => {
                const name = `${c.first_name || ''} ${c.last_name || ''}`.toLowerCase();
                const phone = (c.phone || '').toLowerCase();
                const email = (c.email || '').toLowerCase();
                return name.includes(term) || phone.includes(term) || email.includes(term);
            });
        }

        function renderSuggestions() {
            const searchVal = customerSearchInput.value;
            const matches = filterCustomers(searchVal);
            if (matches.length === 0 || !searchVal.trim()) {
                suggestionsDiv.classList.add('hidden');
                return;
            }
            suggestionsDiv.classList.remove('hidden');
            suggestionsDiv.innerHTML = matches.map(c => {
                const fullName = `${c.first_name || ''} ${c.last_name || ''}`.trim() || 'No name';
                return `
                        <div class="customer-suggestion px-3 py-2 border-b last:border-0 text-sm hover:bg-blue-50" data-user-id="${c.id}" data-name="${escapeAttr(fullName)}" data-phone="${escapeAttr(c.phone || '')}" data-email="${escapeAttr(c.email || '')}" data-points="${c.loyalty_points || 0}">
                            <div class="font-medium">${escapeHtml(fullName)}</div>
                            <div class="text-xs text-gray-500">${escapeHtml(c.phone || '')} · ${escapeHtml(c.email || '')}</div>
                        </div>
                    `;
            }).join('');
            document.querySelectorAll('.customer-suggestion').forEach(el => {
                el.addEventListener('click', () => {
                    const userId = el.dataset.userId;
                    const name = el.dataset.name;
                    const phone = el.dataset.phone;
                    const email = el.dataset.email;
                    const points = parseInt(el.dataset.points, 10);
                    selectCustomer(userId, name, phone, email, points);
                    suggestionsDiv.classList.add('hidden');
                    customerSearchInput.value = name;
                });
            });
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function selectCustomer(userId, name, phone, email, points) {
            const state = tabState[activeTab];
            state.loyaltyUserId = userId;
            state.pointsBalance = points;
            state.pointsRedeemed = 0;
            state.customerName = name;
            state.customerPhone = phone;
            state.customerEmail = email;
            customerNameInput.value = name;
            customerPhoneInput.value = phone;
            customerEmailInput.value = email;
            customerNameDisplay.innerText = name;
            customerPointsSpan.innerText = points;
            customerInfoDiv.classList.remove('hidden');
            if (points > 0) {
                pointsRedeemSection.classList.remove('hidden');
                redeemPointsInput.max = points;
                redeemPointsInput.value = '';
            } else {
                pointsRedeemSection.classList.add('hidden');
            }
            showToast(`Customer selected: ${name} (${points} points)`, 'success');
            renderActiveCart();
        }

        async function loadCustomers() {
            try {
                const data = await apiCall('/organisations/me/users');
                allCustomers = data.users || [];
            } catch (err) {
                console.warn('Failed to load customers:', err);
                allCustomers = [];
            }
        }

        // ─── CART QUANTITY CONTROLS ───
        window.updateCartItemQty = function(index, newQty) {
            const state = tabState[activeTab];
            const cart = state.cart;
            if (index < 0 || index >= cart.length) return;
            newQty = parseInt(newQty, 10);
            if (isNaN(newQty) || newQty < 1) newQty = 1;
            cart[index].qty = newQty;
            renderActiveCart();
        };

        window.incrementCartItem = function(index) {
            const state = tabState[activeTab];
            const cart = state.cart;
            if (index < 0 || index >= cart.length) return;
            // Check stock
            const item = cart[index];
            const productRef = products.find(p => p.id === item.id);
            const availableStock = productRef ? (productRef.current_qty ?? 0) : 9999;
            if (item.qty + 1 > availableStock) {
                showToast(`⚠️ Only ${availableStock} left for "${item.name}"`, 'error');
                return;
            }
            item.qty++;
            renderActiveCart();
        };

        window.decrementCartItem = function(index) {
            const state = tabState[activeTab];
            const cart = state.cart;
            if (index < 0 || index >= cart.length) return;
            if (cart[index].qty > 1) {
                cart[index].qty--;
                renderActiveCart();
            } else {
                // Remove if quantity becomes 0
                cart.splice(index, 1);
                renderActiveCart();
            }
        };

        // ─── TAB & CART RENDER ───
        function syncUIWithActiveTab() {
            const state = tabState[activeTab];
            renderActiveCart();
            paymentMethodSelect.value = state.paymentMethod;
            customerNameInput.value = state.customerName;
            customerPhoneInput.value = state.customerPhone;
            customerEmailInput.value = state.customerEmail;
            activeCustomerLabel.innerText = activeTab === 1 ? 'Customer A' : 'Customer B';
            tabBadge.innerText = activeTab === 1 ? 'Tab 1 active' : 'Tab 2 active';
            if (activeTab === 1) {
                tab1Btn.classList.add('tab-active');
                tab1Btn.classList.remove('tab-inactive');
                tab2Btn.classList.add('tab-inactive');
                tab2Btn.classList.remove('tab-active');
            } else {
                tab2Btn.classList.add('tab-active');
                tab2Btn.classList.remove('tab-inactive');
                tab1Btn.classList.add('tab-inactive');
                tab1Btn.classList.remove('tab-active');
            }
            if (state.loyaltyUserId && state.pointsBalance > 0) {
                customerInfoDiv.classList.remove('hidden');
                customerNameDisplay.innerText = state.customerName || 'Customer';
                customerPointsSpan.innerText = state.pointsBalance;
                pointsRedeemSection.classList.remove('hidden');
                redeemPointsInput.max = state.pointsBalance;
            } else {
                customerInfoDiv.classList.add('hidden');
                pointsRedeemSection.classList.add('hidden');
            }
        }

        function renderActiveCart() {
            const state = tabState[activeTab];
            const cart = state.cart;
            const pointsRedeemed = state.pointsRedeemed || 0;
            if (!cartContainer) return;
            let subtotal = 0;
            let cartHtml = '';
            cart.forEach((item, idx) => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                cartHtml += `
                        <div class="flex justify-between items-center border-b pb-2 hover:bg-gray-50 px-1 rounded">
                            <div class="flex-1 min-w-0">
                                <div class="font-medium text-sm truncate">${escapeHtml(item.name)}</div>
                                <div class="text-xs text-gray-500">₦${item.price.toLocaleString()} × </div>
                            </div>
                            <div class="flex items-center gap-1">
                                <button onclick="decrementCartItem(${idx})" class="qty-btn">−</button>
                                <input type="number" min="1" value="${item.qty}" 
                                       class="qty-input" 
                                       onchange="updateCartItemQty(${idx}, this.value)"
                                       onfocus="this.select()">
                                <button onclick="incrementCartItem(${idx})" class="qty-btn">+</button>
                            </div>
                            <div class="font-semibold text-sm ml-2 w-16 text-right">₦${itemTotal.toLocaleString()}</div>
                            <button onclick="removeCartItem(${idx})" class="ml-2 text-red-500 hover:text-red-700 text-sm w-6 h-6 rounded-full hover:bg-red-50 flex items-center justify-center">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    `;
            });
            let finalTotal = subtotal;
            if (pointsRedeemed > 0) {
                const discount = pointsRedeemed;
                if (discount > finalTotal) {
                    state.pointsRedeemed = Math.min(finalTotal, pointsRedeemed);
                    finalTotal = 0;
                } else {
                    finalTotal = subtotal - discount;
                }
                cartHtml += `
                        <div class="flex justify-between items-center text-green-700 border-t pt-2 mt-1">
                            <div class="text-sm font-medium">🎁 Points Discount (${state.pointsRedeemed} pts)</div>
                            <div class="font-semibold">-₦${discount.toLocaleString()}</div>
                        </div>
                    `;
            }
            if (cart.length === 0) {
                cartContainer.innerHTML =
                    `<div class="text-center text-gray-400 py-6"><i class="fa-regular fa-receipt text-2xl"></i><p class="text-sm mt-1">Cart is empty</p></div>`;
            } else {
                cartContainer.innerHTML = cartHtml;
            }
            cartTotalSpan.innerText = `₦${finalTotal.toLocaleString()}`;
        }

        window.removeCartItem = function(index) {
            const currentCart = tabState[activeTab].cart;
            if (index >= 0 && index < currentCart.length) {
                currentCart.splice(index, 1);
                renderActiveCart();
            }
        };

        window.addToCart = function(productId, productName, price, stock, skuLabel) {
            const activeState = tabState[activeTab];
            const activeCart = activeState.cart;
            const existing = activeCart.find(i => i.id === productId);
            const productRef = products.find(p => p.id === productId);
            const availableStock = productRef ? (productRef.current_qty ?? 0) : stock;

            if (existing) {
                if (existing.qty + 1 > availableStock) {
                    showToast(`⚠️ Only ${availableStock} left for "${productName}"`, 'error');
                    return;
                }
                existing.qty++;
            } else {
                if (1 > availableStock) {
                    showToast(`❌ "${productName}" out of stock`, 'error');
                    return;
                }
                activeCart.push({ id: productId, name: productName, price: price, qty: 1, sku: skuLabel });
            }
            renderActiveCart();
            showToast(`➕ Added ${productName}`, 'success');
        };

        function bindFieldEvents() {
            paymentMethodSelect.onchange = () => { tabState[activeTab].paymentMethod = paymentMethodSelect.value; };
            customerNameInput.addEventListener('input', () => { tabState[activeTab].customerName = customerNameInput.value; });
            customerPhoneInput.addEventListener('input', () => { tabState[activeTab].customerPhone = customerPhoneInput.value; });
            customerEmailInput.addEventListener('input', () => { tabState[activeTab].customerEmail = customerEmailInput.value; });
        }

        // ─── LOYALTY POINTS ───
        async function applyPoints() {
            const state = tabState[activeTab];
            if (!state.loyaltyUserId) {
                showToast('Please search and select a customer first', 'error');
                return;
            }
            let pointsToRedeem = parseInt(redeemPointsInput.value, 10);
            if (isNaN(pointsToRedeem) || pointsToRedeem <= 0) {
                showToast('Enter a valid number of points', 'error');
                return;
            }
            if (pointsToRedeem > state.pointsBalance) {
                showToast(`You only have ${state.pointsBalance} points`, 'error');
                return;
            }
            try {
                await apiCall('/loyalty/redeem', 'POST', { points: pointsToRedeem });
                state.pointsRedeemed = (state.pointsRedeemed || 0) + pointsToRedeem;
                state.pointsBalance -= pointsToRedeem;
                redeemPointsInput.value = '';
                renderActiveCart();
                showToast(`✅ ${pointsToRedeem} points redeemed – ₦${pointsToRedeem} off this order!`, 'success');
                syncUIWithActiveTab();
            } catch (err) {
                showToast(`Redemption failed: ${err.message}`, 'error');
            }
        }

        // ─── CHECKOUT ───
        async function processCheckout() {
            const state = tabState[activeTab];
            const cart = state.cart;
            if (cart.length === 0) {
                showToast('🛒 Cart is empty. Add items first.', 'error');
                return;
            }
            const paymentMethod = state.paymentMethod;
            const customerName = state.customerName.trim() || null;
            const customerPhone = state.customerPhone.trim() || null;
            let customerEmail = state.customerEmail.trim() || null;
            const pointsRedeemed = state.pointsRedeemed || 0;
            if (paymentMethod !== 'cash' && !customerEmail) {
                showToast('📧 Email is required for card/transfer payments', 'error');
                return;
            }
            const itemsPayload = cart.map(i => ({ inventory_id: i.id, quantity: i.qty }));
            const returnUrl = window.location.href.split('?')[0];
            const callback_url = `${returnUrl}?payment=success`;
            checkoutBtn.disabled = true;
            checkoutBtn.innerText = 'Processing...';
            try {
                if (paymentMethod === 'cash') {
                    const result = await apiCall('/pos/terminal/checkout', 'POST', {
                        items: itemsPayload,
                        payment_method: 'cash',
                        customer_name: customerName,
                        customer_phone: customerPhone,
                        customer_email: customerEmail,
                        points_redeemed: pointsRedeemed
                    });
                    showToast(`✅ Sale complete! Receipt: ${result.receipt_number || 'OK'}`, 'success');
                    state.cart = [];
                    state.pointsRedeemed = 0;
                    if (state.loyaltyUserId) {
                        await loadCustomers();
                        const updated = allCustomers.find(c => c.id === state.loyaltyUserId);
                        if (updated) state.pointsBalance = updated.loyalty_points || 0;
                    }
                    syncUIWithActiveTab();
                    const trimmed = posSearchTerm.trim();
                    if (trimmed.length >= 2) loadPOSProducts(true);
                    else {
                        products = [];
                        productContainer.innerHTML = '';
                        emptyMsgDiv.classList.add('hidden');
                    }
                } else {
                    const result = await apiCall('/pos/checkout', 'POST', {
                        items: itemsPayload,
                        customer_name: customerName,
                        customer_email: customerEmail,
                        customer_phone: customerPhone,
                        payment_method: paymentMethod,
                        callback_url: callback_url,
                        points_redeemed: pointsRedeemed
                    });
                    if (result.payment_url) {
                        localStorage.setItem('pending_payment', 'true');
                        localStorage.setItem('pending_payment_tab', activeTab.toString());
                        localStorage.setItem('pending_points_redeemed', pointsRedeemed.toString());
                        window.location.href = result.payment_url;
                    } else {
                        throw new Error('Payment initiation failed');
                    }
                }
            } catch (err) {
                showToast(`❌ Checkout failed: ${err.message}`, 'error');
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = '✅ Complete Sale';
            }
        }

        // ─── PAYMENT RETURN ───
        async function checkPaymentReturn() {
            const urlParams = new URLSearchParams(window.location.search);
            const paymentSuccess = urlParams.get('payment') === 'success';
            const wasPending = localStorage.getItem('pending_payment') === 'true';
            if (paymentSuccess && wasPending) {
                const pendingTab = parseInt(localStorage.getItem('pending_payment_tab') || '1', 10);
                const pointsRedeemed = parseInt(localStorage.getItem('pending_points_redeemed') || '0', 10);
                if (pendingTab === 1 || pendingTab === 2) {
                    tabState[pendingTab].cart = [];
                    tabState[pendingTab].pointsRedeemed = 0;
                    if (activeTab === pendingTab) renderActiveCart();
                    showToast(`🎉 Payment successful! Order confirmed.`, 'success');
                    await loadCustomers();
                    const state = tabState[pendingTab];
                    if (state.loyaltyUserId) {
                        const updated = allCustomers.find(c => c.id === state.loyaltyUserId);
                        if (updated) state.pointsBalance = updated.loyalty_points || 0;
                        if (activeTab === pendingTab) syncUIWithActiveTab();
                    }
                    const trimmed = posSearchTerm.trim();
                    if (trimmed.length >= 2) loadPOSProducts(true);
                    else {
                        products = [];
                        productContainer.innerHTML = '';
                        emptyMsgDiv.classList.add('hidden');
                    }
                }
                localStorage.removeItem('pending_payment');
                localStorage.removeItem('pending_payment_tab');
                localStorage.removeItem('pending_points_redeemed');
                const cleanUrl = window.location.href.split('?')[0];
                window.history.replaceState({}, document.title, cleanUrl);
            }
        }

                    loyaltyUserId: null, pointsBalance: 0, pointsRedeemed: 0 };
                tabState[2] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '',
                    loyaltyUserId: null, pointsBalance: 0, pointsRedeemed: 0 };
                activeTab = 1;
                syncUIWithActiveTab();
                products = [];
                productContainer.innerHTML = '';
                emptyMsgDiv.classList.add('hidden');
                showToast('Login successful', 'success');
            } catch (err) { showToast(err.message, 'error'); }
        }

        checkoutBtn.addEventListener('click', processCheckout);
        applyPointsBtn.addEventListener('click', applyPoints);
        document.getElementById('modal-login-btn')?.addEventListener('click', handleLogin);
        document.getElementById('demo-login-btn')?.addEventListener('click', demoLogin);
        document.getElementById('close-modal-btn')?.addEventListener('click', hideLoginModal);

        // ─── INIT ───
        (async () => {
            initTabs();
            initCustomerSearch();
            bindFieldEvents();
            await checkPaymentReturn();
            if (token) {
                try {
                    await loadCustomers();
                    if (!tabState[1].cart.length && !tabState[2].cart.length) {
                        tabState[1] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '',
                            customerEmail: '', loyaltyUserId: null, pointsBalance: 0, pointsRedeemed: 0 };
                        tabState[2] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '',
                            customerEmail: '', loyaltyUserId: null, pointsBalance: 0, pointsRedeemed: 0 };
                    }
                    activeTab = 1;
                    syncUIWithActiveTab();
                    // Keep product list empty initially
                    productContainer.innerHTML = '';
                    emptyMsgDiv.classList.add('hidden');
                } catch (e) { token = null;
                    showLoginModal(); }
            } else { showLoginModal(); }
        })();
    </script>
</body>
</html>
