<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kevs POS Pro | Multi‑Tab · SKU Search · Online Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tab-active { background-color: #3b82f6; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .tab-inactive { background-color: #f3f4f6; color: #1f2937; border-color: #d1d5db; }
        .tab-inactive:hover { background-color: #e5e7eb; }
        .product-card { transition: all 0.15s ease; }
        .product-card:active { transform: scale(0.98); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loading-spinner { border: 2px solid #e5e7eb; border-top: 2px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .transition-smooth { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-100 p-4 font-sans">

<!-- Global Navigation (same as before) -->
<div id="kevs-nav-container"></div>
<script>
(function() {
    const APP_NAME = 'Kevs<span class="text-orange-500">BI</span>';
    const LOGIN_URL = '/kdsiginin';
    const navItems = [
        { path: '/kdbi',          name: 'Dashboard', icon: 'fa-chart-line', title: 'Marketing metrics, leads & AI strategy', roles: ['owner','admin','sales_rep','finance'] },
        { path: '/kdpos',         name: 'POS',       icon: 'fa-cash-register', title: 'Multi‑tab sales, SKU search & online payments', roles: ['owner','admin','sales_rep'] },
        { path: '/kdfulfillment', name: 'Fulfillment', icon: 'fa-truck-fast', title: 'Order shipping, tracking & dispatch', roles: ['owner','admin','logistics'] },
        { path: '/kdsupport',     name: 'Support',   icon: 'fa-headset', title: 'Ticket management & customer context', roles: ['owner','admin','support'] },
        { path: '/kddashboard',   name: 'Exec',      icon: 'fa-chart-simple', title: 'Executive revenue & profit overview', roles: ['owner','admin','finance'] },
        { path: '/kdadmin',       name: 'Inventory', icon: 'fa-boxes', title: 'Manage products, stock, bulk CSV upload', roles: ['owner','admin','inventory_manager'] },
        { path: '/kdteam',        name: 'Team',      icon: 'fa-users', title: 'Invite & manage team members', roles: ['owner','admin'] },
        { path: '/kdknowledge',   name: 'Knowledge', icon: 'fa-database', title: 'Manage AI knowledge base documents', roles: ['owner','admin'] }
    ];

    function getUserRole() {
        try {
            return localStorage.getItem('user_role') || 'customer';
        } catch(e) { return 'customer'; }
    }

    function canAccess(requiredRoles) {
        return requiredRoles.includes(getUserRole());
    }

    function buildNavbar() {
        const currentPath = window.location.pathname;
        let linksHtml = '';
        navItems.forEach(item => {
            if (!canAccess(item.roles)) return;
            const isActive = currentPath === item.path;
            const activeClass = isActive ? 'bg-white/20 text-white' : 'text-white/80 hover:bg-white/10';
            linksHtml += `
                <a href="${item.path}" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 ${activeClass}" title="${item.title}">
                    <i class="fa-solid ${item.icon} w-4"></i> ${item.name}
                </a>
            `;
        });
        let userName = 'User';
        try {
            const profileStr = localStorage.getItem('user_profile_display');
            if (profileStr) userName = profileStr;
        } catch(e) {}
        return `
            <div class="bg-[#1E3A5F] text-white shadow-md sticky top-0 z-40">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex flex-wrap items-center justify-between py-3 gap-3">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-chart-pie text-orange-400 text-xl"></i>
                            <span class="text-xl font-bold tracking-tight">${APP_NAME}</span>
                            <span class="hidden sm:inline-block text-xs bg-white/20 px-2 py-0.5 rounded-full">bOS</span>
                        </div>
                        <div class="hidden md:flex items-center gap-1 flex-wrap">
                            ${linksHtml}
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/10 px-3 py-1.5 rounded-full hidden sm:inline-block">
                                <i class="fa-regular fa-user mr-1"></i> <span id="nav-user-name">${escapeHtml(userName)}</span>
                            </span>
                            <button id="global-logout-btn" class="bg-red-500/80 hover:bg-red-600 text-white text-sm px-3 py-1.5 rounded-lg transition flex items-center gap-1">
                                <i class="fa-solid fa-sign-out-alt"></i> <span class="hidden sm:inline">Logout</span>
                            </button>
                        </div>
                    </div>
                    <div class="md:hidden flex overflow-x-auto pb-2 gap-1 snap-x">
                        ${linksHtml}
                    </div>
                </div>
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    async function globalLogout() {
        const BACKEND = 'https://kevsono-kevs-digital-bos.hf.space';
        const token = localStorage.getItem('access_token');
        if (token) {
            try {
                await fetch(`${BACKEND}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
            } catch(e) {}
        }
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user_role');
        localStorage.removeItem('user_profile_display');
        window.location.href = LOGIN_URL;
    }

    async function updateUserDisplay() {
        const token = localStorage.getItem('access_token');
        if (!token) return;
        try {
            const res = await fetch('https://kevsono-kevs-digital-bos.hf.space/auth/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const me = await res.json();
                const contextRes = await fetch(`https://kevsono-kevs-digital-bos.hf.space/support/customer-context?target_user_id=${me.user_id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (contextRes.ok) {
                    const context = await contextRes.json();
                    const name = context.profile?.first_name || 'User';
                    localStorage.setItem('user_profile_display', name);
                    const nameSpan = document.getElementById('nav-user-name');
                    if (nameSpan) nameSpan.innerText = name;
                }
            }
        } catch(e) {}
    }

    function initNavigation() {
        const container = document.getElementById('kevs-nav-container');
        if (container) {
            container.innerHTML = buildNavbar();
            const logoutBtn = document.getElementById('global-logout-btn');
            if (logoutBtn) logoutBtn.addEventListener('click', globalLogout);
            updateUserDisplay();
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initNavigation);
    } else {
        initNavigation();
    }
})();
</script>
<!-- End Global Navigation -->

<div id="toast-container" class="fixed top-20 right-4 z-50 space-y-2 w-80"></div>

<div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-xl shadow-md p-4 mb-4 flex flex-wrap justify-between items-center gap-3">
        <div>
            <h1 class="text-2xl font-bold">💳 Kevs POS Terminal</h1>
            <p class="text-xs text-gray-500">Multi‑Tab | SKU Search | Card/Transfer Payments</p>
        </div>
    </div>

    <!-- Location selector (store) -->
    <div class="bg-white rounded-xl shadow-md p-4 mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Select Store Location</label>
        <select id="store-location-select" class="border rounded-lg p-2 bg-white w-full md:w-64">
            <option value="">Loading locations...</option>
        </select>
        <p class="text-xs text-gray-500 mt-1">Stock will be deducted from this physical store.</p>
    </div>

    <!-- TABS for two customers -->
    <div class="flex gap-3 mb-4 border-b border-gray-200 pb-1">
        <button id="tab1-btn" data-tab="1" class="tab-active px-6 py-2.5 rounded-t-lg font-semibold text-sm transition flex items-center gap-2 shadow-sm border">
            <i class="fa-solid fa-user"></i> Customer A <span class="bg-white/20 text-xs px-1.5 py-0.5 rounded-full ml-1 hidden md:inline-block">Tab 1</span>
        </button>
        <button id="tab2-btn" data-tab="2" class="tab-inactive px-6 py-2.5 rounded-t-lg font-semibold text-sm transition flex items-center gap-2 border">
            <i class="fa-solid fa-user-group"></i> Customer B <span class="bg-white/20 text-xs px-1.5 py-0.5 rounded-full ml-1 hidden md:inline-block">Tab 2</span>
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white rounded-xl shadow-md p-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                <h2 class="text-xl font-semibold">📦 Product Catalog</h2>
                <div class="relative w-full sm:w-64">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="product-search" placeholder="Search by SKU, name or ID" class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                </div>
            </div>
            <div id="product-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-h-[500px] overflow-y-auto"></div>
            <div id="product-list-empty" class="hidden text-center py-8 text-gray-400 col-span-full">No products match your search</div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-4 flex flex-col">
            <div class="flex justify-between items-center border-b pb-2 mb-2">
                <h2 class="text-xl font-semibold"><i class="fa-solid fa-cart-shopping"></i> <span id="active-customer-label">Customer A</span> Sale</h2>
                <span class="text-xs bg-gray-100 px-2 py-1 rounded-full" id="tab-badge">Tab 1 active</span>
            </div>
            <div id="cart-items" class="space-y-2 max-h-80 overflow-y-auto flex-1 min-h-[180px]"></div>
            <div class="border-t pt-3 mt-2">
                <div class="flex justify-between text-lg font-bold"><span>Total:</span><span id="cart-total">₦0</span></div>
                <div class="mt-3"><label class="block text-sm font-medium">Payment Method</label>
                    <select id="payment-method" class="w-full border rounded-lg p-2 bg-white">
                        <option value="cash">💵 Cash</option>
                        <option value="card">💳 Card</option>
                        <option value="transfer">🏦 Bank Transfer</option>
                    </select>
                </div>
                <div class="mt-3"><label class="block text-sm font-medium">Customer Name</label>
                    <input id="customer-name" class="w-full border rounded-lg p-2" placeholder="Walk-in Customer" autocomplete="off">
                </div>
                <div class="mt-2"><label class="block text-sm font-medium">Phone Number</label>
                    <input id="customer-phone" class="w-full border rounded-lg p-2" placeholder="Optional" autocomplete="off">
                </div>
                <div class="mt-2"><label class="block text-sm font-medium">Email (for receipt/payment)</label>
                    <input id="customer-email" type="email" class="w-full border rounded-lg p-2" placeholder="customer@example.com" autocomplete="off">
                </div>
                <button id="checkout-btn" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-2.5 rounded-lg font-bold transition shadow-md">
                    ✅ Complete Sale
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-gray-800">🔐 Sign In to POS</h3>
            <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="space-y-3">
            <input id="login-email" type="email" placeholder="Email" class="w-full border rounded-lg p-2 text-sm">
            <input id="login-password" type="password" placeholder="Password" class="w-full border rounded-lg p-2 text-sm">
            <button id="modal-login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg text-sm font-medium">Sign In</button>
            <button id="demo-login-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white p-2.5 rounded-lg text-sm font-medium">
                <i class="fa-solid fa-bolt mr-1"></i> Demo Login
            </button>
        </div>
    </div>
</div>

<script>
    const BACKEND = 'https://kevsono-kevs-digital-bos.hf.space';
    // Multi-location feature flag
    const ENABLE_MULTI_LOCATION = true;
    let token = localStorage.getItem('access_token');
    let products = [];
    let searchTerm = '';
    let activeTab = 1;
    const tabState = {
        1: { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' },
        2: { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' }
    };
    let selectedLocationId = null; // store location UUID

    const productContainer = document.getElementById('product-list');
    const emptyMsgDiv = document.getElementById('product-list-empty');
    const cartContainer = document.getElementById('cart-items');
    const cartTotalSpan = document.getElementById('cart-total');
    const paymentMethodSelect = document.getElementById('payment-method');
    const customerNameInput = document.getElementById('customer-name');
    const customerPhoneInput = document.getElementById('customer-phone');
    const customerEmailInput = document.getElementById('customer-email');
    const activeCustomerLabel = document.getElementById('active-customer-label');
    const tabBadge = document.getElementById('tab-badge');
    const tab1Btn = document.getElementById('tab1-btn');
    const tab2Btn = document.getElementById('tab2-btn');
    const checkoutBtn = document.getElementById('checkout-btn');
    const searchInput = document.getElementById('product-search');

    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `px-4 py-2 rounded-lg shadow-lg text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} mb-2 text-sm flex items-center gap-2`;
        toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3800);
    }

    async function refreshToken() {
        const refresh = localStorage.getItem('refresh_token');
        if (!refresh) return false;
        try {
            const res = await fetch(`${BACKEND}/auth/refresh`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: refresh })
            });
            if (res.ok) {
                const { access_token, refresh_token } = await res.json();
                localStorage.setItem('access_token', access_token);
                localStorage.setItem('refresh_token', refresh_token);
                token = access_token;
                return true;
            }
        } catch (e) { }
        return false;
    }

    async function call(endpoint, method = 'GET', body = null, retry = true) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        let res = await fetch(`${BACKEND}${endpoint}`, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined
        });
        if (res.status === 401 && retry) {
            const ok = await refreshToken();
            if (ok) return call(endpoint, method, body, false);
            showLoginModal();
            throw new Error('Session expired');
        }
        if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: 'Request error' }));
            throw new Error(err.detail || 'API error');
        }
        return res.json();
    }

    function showLoginModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
    function hideLoginModal() { document.getElementById('auth-modal').classList.add('hidden'); }

    // UPDATED: loadStoreLocations with v2 fallback
    async function loadStoreLocations() {
        try {
            let locs;
            try {
                locs = await call('/v2/inventory/locations');
            } catch (err) {
                console.warn('v2 locations failed, trying alias', err);
                locs = await call('/inventory/locations');
            }
            const storeSelect = document.getElementById('store-location-select');
            const storeLocs = locs.filter(l => l.type === 'store');
            if (storeLocs.length === 0) {
                storeSelect.innerHTML = '<option value="">No store location found. Contact admin.</option>';
                showToast('No store location configured. POS will not work.', 'error');
                return;
            }
            storeSelect.innerHTML = storeLocs.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');
            selectedLocationId = storeLocs[0].id;
            storeSelect.value = selectedLocationId;
            storeSelect.onchange = () => { 
                selectedLocationId = storeSelect.value;
                // Reload products when store changes to reflect accurate stock levels
                if (token) loadProducts();
            };
        } catch (err) {
            console.error(err);
            showToast('Failed to load store locations', 'error');
        }
    }

    // UPDATED: loadProducts with location-aware endpoint
    async function loadProducts() {
        if (!selectedLocationId && ENABLE_MULTI_LOCATION) {
            // Wait until location is loaded
            return;
        }
        try {
            let data;
            if (selectedLocationId && ENABLE_MULTI_LOCATION) {
                // Use location-specific endpoint for accurate stock per store
                data = await call(`/v2/inventory?location_id=${selectedLocationId}`);
            } else {
                data = await call('/inventory');
            }
            products = data;
            renderProductGrid();
        } catch (err) {
            showToast('Failed to load products: ' + err.message, 'error');
            products = [];
            renderProductGrid();
        }
    }

    function getDisplaySku(product) {
        if (product.sku) return product.sku;
        if (product.sku_code) return product.sku_code;
        return `ID:${product.id}`;
    }

    // UPDATED: getStockAtStore with robust detection for both v2 and aggregated endpoints
    function getStockAtStore(product) {
        if (!selectedLocationId) return 0;
        // If using v2 endpoint with location_id, stock is directly in current_qty and location_id matches
        if (product.location_id === selectedLocationId) {
            return product.current_qty || 0;
        }
        // If using aggregated endpoint with location_stocks array (fallback)
        if (product.location_stocks && Array.isArray(product.location_stocks)) {
            const locStock = product.location_stocks.find(s => s.location_id === selectedLocationId);
            return locStock ? locStock.quantity : 0;
        }
        // Fallback for generic product without location data
        return product.current_qty || 0;
    }

    function filterProducts() {
        if (!searchTerm.trim()) return products;
        const term = searchTerm.trim().toLowerCase();
        return products.filter(p => {
            const skuRaw = getDisplaySku(p).toLowerCase();
            const desc = (p.description || '').toLowerCase();
            const idMatch = p.id.toString().includes(term);
            return skuRaw.includes(term) || desc.includes(term) || idMatch;
        });
    }

    function renderProductGrid() {
        const filtered = filterProducts();
        if (!productContainer) return;
        if (filtered.length === 0) {
            productContainer.innerHTML = '';
            emptyMsgDiv.classList.remove('hidden');
            return;
        }
        emptyMsgDiv.classList.add('hidden');
        productContainer.innerHTML = filtered.map(p => {
            const skuDisplay = getDisplaySku(p);
            const stockAtStore = getStockAtStore(p);
            const price = p.price_naira ?? 0;
            const descSafe = escapeHtml(p.description || 'Unnamed product');
            const outOfStockClass = stockAtStore <= 0 ? 'opacity-50 bg-gray-100' : '';
            const disabledAttr = stockAtStore <= 0 ? 'disabled' : '';
            return `
                <button ${disabledAttr} onclick="addToCart(${p.id}, '${descSafe}', ${price}, ${stockAtStore}, '${escapeHtml(skuDisplay)}')" 
                        class="product-card ${outOfStockClass} bg-gray-50 p-3 rounded-xl text-left hover:bg-blue-50 border border-gray-200 transition shadow-sm">
                    <div class="font-semibold text-gray-800">${descSafe}</div>
                    <div class="text-xs text-gray-500 font-mono mt-0.5">📟 ${escapeHtml(skuDisplay)}</div>
                    <div class="text-md font-bold text-blue-700 mt-1">₦${price.toLocaleString()}</div>
                    <div class="text-xs text-gray-500 mt-1">📦 Stock: ${stockAtStore}</div>
                </button>
            `;
        }).join('');
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

    function syncUIWithActiveTab() {
        const state = tabState[activeTab];
        renderActiveCart();
        paymentMethodSelect.value = state.paymentMethod;
        customerNameInput.value = state.customerName;
        customerPhoneInput.value = state.customerPhone;
        customerEmailInput.value = state.customerEmail;
        activeCustomerLabel.innerText = activeTab === 1 ? 'Customer A' : 'Customer B';
        tabBadge.innerText = activeTab === 1 ? 'Tab 1 active' : 'Tab 2 active';
        if (activeTab === 1) {
            tab1Btn.classList.add('tab-active');
            tab1Btn.classList.remove('tab-inactive');
            tab2Btn.classList.add('tab-inactive');
            tab2Btn.classList.remove('tab-active');
        } else {
            tab2Btn.classList.add('tab-active');
            tab2Btn.classList.remove('tab-inactive');
            tab1Btn.classList.add('tab-inactive');
            tab1Btn.classList.remove('tab-active');
        }
    }

    function renderActiveCart() {
        const cart = tabState[activeTab].cart;
        if (!cartContainer) return;
        if (cart.length === 0) {
            cartContainer.innerHTML = `<div class="text-center text-gray-400 py-6"><i class="fa-regular fa-receipt text-2xl"></i><p class="text-sm mt-1">Cart is empty</p></div>`;
            cartTotalSpan.innerText = `₦0`;
            return;
        }
        let total = 0;
        cartContainer.innerHTML = cart.map((item, idx) => {
            const subtotal = item.price * item.qty;
            total += subtotal;
            return `
                <div class="flex justify-between items-center border-b pb-2 hover:bg-gray-50 px-1 rounded">
                    <div class="flex-1">
                        <div class="font-medium text-sm">${escapeHtml(item.name)}</div>
                        <div class="text-xs text-gray-500">₦${item.price.toLocaleString()} x ${item.qty}</div>
                    </div>
                    <div class="font-semibold text-sm">₦${subtotal.toLocaleString()}</div>
                    <button onclick="removeCartItem(${idx})" class="ml-3 text-red-500 hover:text-red-700 text-sm w-7 h-7 rounded-full hover:bg-red-50"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            `;
        }).join('');
        cartTotalSpan.innerText = `₦${total.toLocaleString()}`;
    }

    window.removeCartItem = function(index) {
        const currentCart = tabState[activeTab].cart;
        if (index >= 0 && index < currentCart.length) {
            currentCart.splice(index, 1);
            renderActiveCart();
        }
    };

    window.addToCart = function(productId, productName, price, stockAtStore, skuLabel) {
        if (stockAtStore <= 0) {
            showToast(`❌ "${productName}" is out of stock at this store`, 'error');
            return;
        }
        const activeCart = tabState[activeTab].cart;
        const existing = activeCart.find(i => i.id === productId);
        if (existing) {
            if (existing.qty + 1 > stockAtStore) {
                showToast(`⚠️ Only ${stockAtStore} left for "${productName}"`, 'error');
                return;
            }
            existing.qty++;
        } else {
            activeCart.push({ id: productId, name: productName, price: price, qty: 1, sku: skuLabel });
        }
        renderActiveCart();
        showToast(`➕ Added ${productName}`, 'success');
    };

    function bindFieldEvents() {
        paymentMethodSelect.onchange = () => { tabState[activeTab].paymentMethod = paymentMethodSelect.value; };
        customerNameInput.oninput = () => { tabState[activeTab].customerName = customerNameInput.value; };
        customerPhoneInput.oninput = () => { tabState[activeTab].customerPhone = customerPhoneInput.value; };
        customerEmailInput.oninput = () => { tabState[activeTab].customerEmail = customerEmailInput.value; };
    }

    function clearCartForTab(tabId) {
        tabState[tabId].cart = [];
        if (activeTab === tabId) renderActiveCart();
    }

    // UPDATED: processCheckout ensures location_id is always sent for both cash and online payments
    async function processCheckout() {
        if (!selectedLocationId) {
            showToast('Please select a store location', 'error');
            return;
        }
        const state = tabState[activeTab];
        const cart = state.cart;
        if (cart.length === 0) {
            showToast('🛒 Cart is empty. Add items first.', 'error');
            return;
        }
        const paymentMethod = state.paymentMethod;
        const customerName = state.customerName.trim() || null;
        const customerPhone = state.customerPhone.trim() || null;
        let customerEmail = state.customerEmail.trim() || null;

        if (paymentMethod !== 'cash' && !customerEmail) {
            showToast('📧 Email is required for card/transfer payments', 'error');
            return;
        }
        
        const itemsPayload = cart.map(i => ({ inventory_id: i.id, quantity: i.qty }));
        const returnUrl = window.location.href.split('?')[0];
        const callback_url = `${returnUrl}?payment=success`;

        checkoutBtn.disabled = true;
        checkoutBtn.innerText = 'Processing...';

        try {
            if (paymentMethod === 'cash') {
                const result = await call('/pos/terminal/checkout', 'POST', {
                    items: itemsPayload,
                    payment_method: 'cash',
                    customer_name: customerName,
                    customer_phone: customerPhone,
                    customer_email: customerEmail,
                    location_id: selectedLocationId
                });
                showToast(`✅ Sale complete! Receipt: ${result.receipt_number || 'OK'}`, 'success');
                tabState[activeTab].cart = [];
                syncUIWithActiveTab();
                await loadProducts(); // refresh stock display
            } 
            else {
                const payload = {
                    items: itemsPayload,
                    customer_name: customerName,
                    customer_email: customerEmail,
                    customer_phone: customerPhone,
                    payment_method: paymentMethod,
                    callback_url: callback_url,
                    location_id: selectedLocationId
                };
                const result = await call('/pos/checkout', 'POST', payload);
                if (result.payment_url) {
                    localStorage.setItem('pending_payment', 'true');
                    localStorage.setItem('pending_payment_tab', activeTab.toString());
                    localStorage.setItem('pending_tab_cart_snapshot', JSON.stringify(cart));
                    window.location.href = result.payment_url;
                } else {
                    throw new Error('Payment initiation failed: no payment URL');
                }
            }
        } catch (err) {
            showToast(`❌ Checkout failed: ${err.message}`, 'error');
            checkoutBtn.disabled = false;
            checkoutBtn.innerText = '✅ Complete Sale';
        }
        
        if (paymentMethod === 'cash') {
            checkoutBtn.disabled = false;
            checkoutBtn.innerText = '✅ Complete Sale';
        }
    }

    async function checkPaymentReturn() {
        const urlParams = new URLSearchParams(window.location.search);
        const paymentSuccess = urlParams.get('payment') === 'success';
        const wasPending = localStorage.getItem('pending_payment') === 'true';
        
        if (paymentSuccess && wasPending) {
            const pendingTabRaw = localStorage.getItem('pending_payment_tab');
            const pendingTab = pendingTabRaw ? parseInt(pendingTabRaw, 10) : null;
            if (pendingTab === 1 || pendingTab === 2) {
                clearCartForTab(pendingTab);
                if (activeTab !== pendingTab) {
                    tabState[pendingTab].cart = [];
                } else {
                    renderActiveCart();
                }
                showToast(`🎉 Payment successful! Order confirmed for ${pendingTab === 1 ? 'Customer A' : 'Customer B'}.`, 'success');
                await loadProducts();
            } else {
                clearCartForTab(activeTab);
                renderActiveCart();
                showToast(`🎉 Payment successful! Cart cleared.`, 'success');
                await loadProducts();
            }
            localStorage.removeItem('pending_payment');
            localStorage.removeItem('pending_payment_tab');
            localStorage.removeItem('pending_tab_cart_snapshot');
            const cleanUrl = window.location.href.split('?')[0];
            window.history.replaceState({}, document.title, cleanUrl);
        } else if (!paymentSuccess && wasPending) {
            localStorage.removeItem('pending_payment');
            localStorage.removeItem('pending_payment_tab');
            localStorage.removeItem('pending_tab_cart_snapshot');
            showToast('⚠️ Payment was not completed. Your cart is unchanged.', 'error');
        }
    }

    function setActiveTab(tabId) {
        if (tabId === activeTab) return;
        tabState[activeTab].paymentMethod = paymentMethodSelect.value;
        tabState[activeTab].customerName = customerNameInput.value;
        tabState[activeTab].customerPhone = customerPhoneInput.value;
        tabState[activeTab].customerEmail = customerEmailInput.value;
        activeTab = tabId;
        syncUIWithActiveTab();
        renderProductGrid();
    }

    function initTabs() {
        tab1Btn.onclick = () => setActiveTab(1);
        tab2Btn.onclick = () => setActiveTab(2);
    }

    function initSearch() {
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderProductGrid();
        });
    }

    async function demoLogin() {
        const btn = document.getElementById('demo-login-btn');
        btn.disabled = true;
        try {
            const res = await fetch(`${BACKEND}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'demo@kevsdigital.com', password: 'KevsDemo2026!' })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            token = data.access_token;
            localStorage.setItem('access_token', token);
            localStorage.setItem('refresh_token', data.refresh_token);
            try {
                const me = await call('/auth/me');
                const role = me.role || 'customer';
                localStorage.setItem('user_role', role);
            } catch(e) {}
            await loadStoreLocations();
            await loadProducts();
            hideLoginModal();
            tabState[1] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' };
            tabState[2] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' };
            activeTab = 1;
            syncUIWithActiveTab();
            showToast('Demo login successful — Multi‑Tab & Online Payments ready', 'success');
            location.reload();
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.disabled = false;
        }
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const pwd = document.getElementById('login-password').value.trim();
        if (!email || !pwd) { showToast('Enter email and password', 'error'); return; }
        try {
            const res = await fetch(`${BACKEND}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password: pwd })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail);
            token = data.access_token;
            localStorage.setItem('access_token', token);
            localStorage.setItem('refresh_token', data.refresh_token);
            const me = await call('/auth/me');
            const role = me.role || 'customer';
            localStorage.setItem('user_role', role);
            await loadStoreLocations();
            await loadProducts();
            hideLoginModal();
            tabState[1] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' };
            tabState[2] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' };
            activeTab = 1;
            syncUIWithActiveTab();
            showToast('Login successful', 'success');
            location.reload();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }

    checkoutBtn.addEventListener('click', processCheckout);
    document.getElementById('modal-login-btn')?.addEventListener('click', handleLogin);
    document.getElementById('demo-login-btn')?.addEventListener('click', demoLogin);
    document.getElementById('close-modal-btn')?.addEventListener('click', hideLoginModal);
    
    (async () => {
        initTabs();
        initSearch();
        bindFieldEvents();
        await checkPaymentReturn();
        
        if (token) {
            try {
                await loadStoreLocations();
                await loadProducts();
                if (!tabState[1].cart.length && !tabState[2].cart.length) {
                    tabState[1] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' };
                    tabState[2] = { cart: [], paymentMethod: 'cash', customerName: '', customerPhone: '', customerEmail: '' };
                }
                activeTab = 1;
                syncUIWithActiveTab();
            } catch (e) {
                token = null;
                showLoginModal();
            }
        } else {
            showLoginModal();
        }
    })();
</script>
</body>
